---
extends: default

rules:
  line-length:
    max: 160
    allow-non-breakable-words: true
  document-start: disable
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  buildroot/
  output/
  dl/
  node_modules/
