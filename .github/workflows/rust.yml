name: Rust Userspace

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]
  workflow_dispatch:

# Permissions: minimum gerekli
permissions:
  contents: read

# Eski koşumları cancel et — yeni commit gelirse
concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./userspace
    shell: bash

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  # Reproducible build için sabit timestamp
  SOURCE_DATE_EPOCH: 1704067200

jobs:
  # -----------------------------------------------------------------
  # Format + Clippy + Test (host glibc, hızlı geri bildirim)
  # -----------------------------------------------------------------
  check:
    name: Format + Clippy + Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            userspace/target
          key: rust-check-${{ runner.os }}-${{ hashFiles('userspace/Cargo.lock', 'userspace/rust-toolchain.toml') }}
          restore-keys: |
            rust-check-${{ runner.os }}-

      - name: rust-toolchain (pinned)
        run: rustup show

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (host)
        run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: cargo test (host)
        run: cargo test --workspace --target x86_64-unknown-linux-gnu

  # -----------------------------------------------------------------
  # Cross-compile (musl static, production target)
  # -----------------------------------------------------------------
  build-musl:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            userspace/target
          key: rust-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('userspace/Cargo.lock') }}
          restore-keys: |
            rust-build-${{ runner.os }}-${{ matrix.target }}-

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # cross-rs Docker container ile build (musl toolchain dahil, network
      # bağımsız). x86 + aarch64 musl için tek mekanizma — musl.cc retry
      # gibi sürprizler olmadan.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: cross build --release (${{ matrix.target }})
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Binary boyut raporu
        run: |
          {
            echo "## Binary boyutları (${{ matrix.target }})"
            echo "| Binary | Boyut |"
            echo "|---|---|"
            for b in target/${{ matrix.target }}/release/suderra-*; do
              if [ -x "$b" ] && [ ! -d "$b" ]; then
                size=$(du -h "$b" | cut -f1)
                echo "| $(basename "$b") | $size |"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: suderra-userspace-${{ matrix.target }}
          path: |
            userspace/target/${{ matrix.target }}/release/suderra-*
            !userspace/target/${{ matrix.target }}/release/*.d
            !userspace/target/${{ matrix.target }}/release/*.rlib
          retention-days: 7

  # -----------------------------------------------------------------
  # Security: cargo-deny (advisories + bans + licenses + sources)
  #
  # cargo-deny'nin [advisories] config'i zaten RustSec/advisory-db ile
  # CVE check yapar (cargo-audit ile aynı kaynak). cargo-audit ayrı step
  # eklemek duplicate iş — kaldırıldı, cargo deny check yeterli.
  # -----------------------------------------------------------------
  security:
    name: Security (audit + deny)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check (advisories + bans + licenses + sources)
        run: cargo deny check

  # -----------------------------------------------------------------
  # MSRV check (rust-toolchain.toml ile pinli versiyon doğrulaması)
  # -----------------------------------------------------------------
  msrv:
    name: MSRV check (Rust 1.86)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: rustup show   # rust-toolchain.toml otomatik kurulur
      - run: cargo check --workspace --target x86_64-unknown-linux-gnu
