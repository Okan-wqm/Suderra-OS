name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer release version, for example v0.1.0-rc.1"
        required: true
        type: string
      source_sha:
        description: "Exact commit SHA to bind"
        required: true
        type: string
      source_run_id:
        description: "Successful Image Build workflow run ID for source_sha"
        required: true
        type: string
      evidence_ingress_run_id:
        description: "Successful Release Evidence Ingress run ID for release-authorizing evidence"
        required: false
        type: string
      evidence_ingress_manifest_sha256:
        description: "Expected SHA-256 of release-ingress/<version>/evidence-ingress-manifest.json"
        required: false
        type: string
      profile:
        description: "Preflight profile"
        required: true
        default: technical-dry-run
        type: choice
        options:
          - technical-dry-run
          - rc-evidence-dry-run
          - release-candidate
          - production-candidate

permissions:
  actions: read
  attestations: read
  checks: read
  contents: read
  id-token: write

concurrency:
  group: release-preflight-${{ inputs.profile }}-${{ inputs.version }}-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  preflight:
    name: ${{ inputs.profile }} (${{ inputs.version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      VERSION: ${{ inputs.version }}
      SOURCE_SHA: ${{ inputs.source_sha }}
      SOURCE_RUN_ID: ${{ inputs.source_run_id }}
      EVIDENCE_INGRESS_RUN_ID: ${{ inputs.evidence_ingress_run_id }}
      EVIDENCE_INGRESS_MANIFEST_SHA256: ${{ inputs.evidence_ingress_manifest_sha256 }}
      PROFILE: ${{ inputs.profile }}
    steps:
      - name: Validate source Image Build run
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}" > source-run.json
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ["VERSION"]
          source_sha = os.environ["SOURCE_SHA"]
          profile = os.environ["PROFILE"]
          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9][A-Za-z0-9.-]*)?", version):
              raise SystemExit(f"invalid SemVer version: {version}")
          if profile in {"rc-evidence-dry-run", "release-candidate"} and "-" not in version:
              raise SystemExit(f"{profile} profile requires a prerelease version")
          if profile == "production-candidate" and "-" in version:
              raise SystemExit("production-candidate profile requires a GA version")
          if not re.fullmatch(r"[0-9a-f]{40}", source_sha):
              raise SystemExit("source_sha must be a lowercase git commit sha")
          manifest_sha = os.environ.get("EVIDENCE_INGRESS_MANIFEST_SHA256", "")
          release_authorizing_profiles = {"release-candidate", "production-candidate"}
          protected_source_profiles = {"rc-evidence-dry-run", "release-candidate", "production-candidate"}
          if profile in release_authorizing_profiles:
              if not re.fullmatch(r"[0-9a-f]{64}", manifest_sha):
                  raise SystemExit(f"{profile} requires evidence_ingress_manifest_sha256 as a lowercase sha256")
          run = json.loads(Path("source-run.json").read_text(encoding="utf-8"))
          if run.get("name") != "Image Build":
              raise SystemExit(f"source_run_id must point to Image Build workflow, got {run.get('name')!r}")
          if run.get("path") != ".github/workflows/image-build.yml":
              raise SystemExit(f"source_run_id must point to .github/workflows/image-build.yml, got {run.get('path')!r}")
          if run.get("head_sha") != source_sha:
              raise SystemExit(f"source_run_id head_sha {run.get('head_sha')} does not match {source_sha}")
          if run.get("status") != "completed" or run.get("conclusion") != "success":
              raise SystemExit(f"source Image Build run is not successful: {run.get('status')} {run.get('conclusion')}")
          if profile in protected_source_profiles and run.get("event") != "push":
              raise SystemExit(f"{profile} source Image Build run must be a protected main push, got {run.get('event')!r}")
          repo = run.get("head_repository")
          if profile in protected_source_profiles and (
              not isinstance(repo, dict) or repo.get("full_name") != os.environ.get("GITHUB_REPOSITORY")
          ):
              raise SystemExit(f"{profile} source Image Build run must come from this repository")
          if profile in protected_source_profiles and run.get("head_branch") != "main":
              raise SystemExit(f"{profile} source Image Build run must come from main, got {run.get('head_branch')!r}")
          if profile in protected_source_profiles and os.environ.get("GITHUB_REF") != "refs/heads/main":
              raise SystemExit(f"{profile} preflight must be dispatched from refs/heads/main")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"run_attempt={run.get('run_attempt', 1)}\n")
          PY

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.source_sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Validate build matrix
        run: python3 scripts/ci/validate-build-matrix.py validate

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da
        with:
          cosign-release: 'v2.4.1'

      - name: Verify source commit is protected-main derived
        if: ${{ inputs.profile != 'technical-dry-run' }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "${SOURCE_SHA}"

      - name: Download operator evidence ingress artifact
        if: ${{ inputs.profile == 'release-candidate' || inputs.profile == 'production-candidate' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ATTEMPT: ${{ steps.source.outputs.run_attempt }}
        run: |
          set -euo pipefail
          test -n "${EVIDENCE_INGRESS_RUN_ID}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${EVIDENCE_INGRESS_RUN_ID}" > evidence-ingress-run.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${EVIDENCE_INGRESS_RUN_ID}/artifacts" > evidence-ingress-artifacts.json
          artifact_name="rei-${VERSION}-${SOURCE_SHA}-${SOURCE_RUN_ID}-${SOURCE_RUN_ATTEMPT}"
          python3 - "${artifact_name}" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          artifact_name = sys.argv[1]
          run = json.loads(Path("evidence-ingress-run.json").read_text(encoding="utf-8"))
          if run.get("name") != "Release Evidence Ingress":
              raise SystemExit(f"evidence ingress run must be named Release Evidence Ingress, got {run.get('name')!r}")
          if run.get("path") != ".github/workflows/release-evidence-ingress.yml":
              raise SystemExit(f"evidence ingress run path mismatch: {run.get('path')!r}")
          expected = {
              "head_sha": os.environ["SOURCE_SHA"],
              "head_branch": "main",
              "event": "workflow_dispatch",
              "status": "completed",
              "conclusion": "success",
          }
          for key, value in expected.items():
              if run.get(key) != value:
                  raise SystemExit(f"evidence ingress run {key} must be {value!r}, got {run.get(key)!r}")
          repo = run.get("head_repository")
          if not isinstance(repo, dict) or repo.get("full_name") != os.environ.get("GITHUB_REPOSITORY"):
              raise SystemExit("evidence ingress run must come from this repository")
          artifacts = json.loads(Path("evidence-ingress-artifacts.json").read_text(encoding="utf-8"))
          items = artifacts.get("artifacts") if isinstance(artifacts, dict) else None
          if not isinstance(items, list):
              raise SystemExit("evidence ingress artifacts response is malformed")
          matches = [item for item in items if isinstance(item, dict) and item.get("name") == artifact_name]
          if len(matches) != 1:
              raise SystemExit(f"expected exactly one evidence ingress artifact named {artifact_name}, got {len(matches)}")
          artifact = matches[0]
          if artifact.get("expired") is True:
              raise SystemExit("evidence ingress artifact is expired")
          if not isinstance(artifact.get("size_in_bytes"), int) or artifact["size_in_bytes"] <= 0:
              raise SystemExit("evidence ingress artifact must have a positive size")
          PY
          gh run download "${EVIDENCE_INGRESS_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${artifact_name}" \
            --dir .
          if [ -n "${EVIDENCE_INGRESS_MANIFEST_SHA256}" ]; then
            printf '%s  %s\n' \
              "${EVIDENCE_INGRESS_MANIFEST_SHA256}" \
              "release-ingress/${VERSION}/evidence-ingress-manifest.json" | sha256sum -c -
          fi
          python3 scripts/evidence/operator-evidence-ingress.py validate \
            "release-ingress/${VERSION}/evidence-ingress-manifest.json" \
            --input-root . \
            --expected-version "${VERSION}" \
            --expected-source-sha "${SOURCE_SHA}" \
            --expected-source-image-build-run-id "${SOURCE_RUN_ID}" \
            --expected-source-image-build-run-attempt "${SOURCE_RUN_ATTEMPT}" \
            --require-signature \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-evidence-ingress.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Download source Image Build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build-artifacts
          python3 - <<'PY' > expected-build-artifacts.txt
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "validate_build_matrix",
              Path("scripts/ci/validate-build-matrix.py"),
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          matrix = module.load_matrix(Path("ci/build-matrix.yml"))
          names = []
          for row in matrix.get("defconfigs", []):
              if row.get("release"):
                  names.append(f"{row['name']}-image")
                  names.append(f"{row['name']}-build-logs")
          names.extend(["installer-x86_64", "installer-aarch64"])
          names.append("image-build-contract")
          for name in sorted(set(names)):
              print(name)
          PY
          while read -r artifact_name; do
            [ -n "${artifact_name}" ] || continue
            mkdir -p "build-artifacts/${artifact_name}"
            gh run download "${SOURCE_RUN_ID}" \
              --repo "${GITHUB_REPOSITORY}" \
              --name "${artifact_name}" \
              --dir "build-artifacts/${artifact_name}"
          done < expected-build-artifacts.txt

      - name: Verify source Image Build artifact attestations
        if: ${{ inputs.profile != 'technical-dry-run' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find build-artifacts -type f -print0 | sort -z | while IFS= read -r -d '' artifact; do
            gh attestation verify "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --cert-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/image-build.yml@refs/heads/main" \
              --cert-oidc-issuer "https://token.actions.githubusercontent.com"
          done

      - name: Validate image build contract
        run: |
          set -euo pipefail
          python3 scripts/ci/image-build-contract.py validate \
            build-artifacts/image-build-contract/image-build-contract.json \
            --artifact-root build-artifacts \
            --workflow-path ".github/workflows/image-build.yml" \
            --source-sha "${SOURCE_SHA}" \
            --source-run-id "${SOURCE_RUN_ID}" \
            --source-run-attempt "${{ steps.source.outputs.run_attempt }}"

      - name: Bind Image Build artifacts to release inputs
        run: |
          set -euo pipefail
          mkdir -p "release-inputs/${VERSION}"
          python3 scripts/evidence/prepare-release-inputs.py plan \
            --version "${VERSION}" \
            --source-run-id "${SOURCE_RUN_ID}" \
            --source-run-attempt "${{ steps.source.outputs.run_attempt }}" \
            --source-sha "${SOURCE_SHA}" \
            --profile "${PROFILE}" \
            --build-workflow-name "Image Build" \
            --build-workflow-path ".github/workflows/image-build.yml" \
            --image-build-contract "build-artifacts/image-build-contract/image-build-contract.json" \
            --artifact-root build-artifacts \
            --require-artifacts \
            --output "release-inputs/${VERSION}/${PROFILE}.json"

      - name: Collect governance evidence
        if: ${{ inputs.profile != 'technical-dry-run' }}
        env:
          GH_TOKEN: ${{ secrets.GOVERNANCE_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -f "release-governance/${VERSION}/audit-log.json" ]; then
            mkdir -p governance-audit-source
            cp "release-governance/${VERSION}/audit-log.json" governance-audit-source/audit-log.json
            export SUDERRA_GOVERNANCE_AUDIT_LOG="${PWD}/governance-audit-source/audit-log.json"
          fi
          python3 scripts/evidence/collect-governance.py \
            --repo "${GITHUB_REPOSITORY}" \
            --version "${VERSION}" \
            --output-root release-governance \
            --repo-root .
          python3 scripts/evidence/validate-governance.py \
            --policy ci/github-governance-policy.yml \
            --snapshot-root "release-governance/${VERSION}" \
            --output "release-governance/${VERSION}/governance-policy-validation.json"

      - name: Collect CI check security evidence
        if: ${{ inputs.profile != 'technical-dry-run' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "release-security/${VERSION}" "release-governance/${VERSION}"
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/commits/${SOURCE_SHA}/check-runs?per_page=100" \
            > "release-governance/${VERSION}/github-check-runs.json"
          if [ "${PROFILE}" != "production-candidate" ]; then
            python3 scripts/evidence/collect-ci-check-evidence.py \
              --version "${VERSION}" \
              --source-sha "${SOURCE_SHA}" \
              --source-run-id "${SOURCE_RUN_ID}" \
              --checks-json "release-governance/${VERSION}/github-check-runs.json" \
              --output-root release-security
          fi

      - name: Generate release subject graph
        if: ${{ inputs.profile != 'technical-dry-run' }}
        run: |
          set -euo pipefail
          mkdir -p "release-subject-graph/${VERSION}"
          python3 scripts/evidence/prepare-release-inputs.py subject-graph \
            --binding-manifest "release-inputs/${VERSION}/${PROFILE}.json" \
            --input-root . \
            --output "release-subject-graph/${VERSION}/release-subject-graph.json"

      - name: Create RC evidence dry-run bundle
        if: ${{ inputs.profile == 'rc-evidence-dry-run' }}
        run: |
          set -euo pipefail
          python3 scripts/evidence/rc-evidence-dry-run.py create \
            --binding-manifest "release-inputs/${VERSION}/${PROFILE}.json" \
            --input-root . \
            --output-root release-dry-run
          python3 scripts/evidence/rc-evidence-dry-run.py validate \
            "release-dry-run/${VERSION}/bundle-manifest.json" \
            --input-root .

      - name: Create scanner-native security evidence
        if: ${{ inputs.profile == 'production-candidate' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          version = "${{ inputs.version }}"
          source_sha = "${{ inputs.source_sha }}"
          source_run_id = "${{ inputs.source_run_id }}"
          source_run_attempt = "${{ steps.source.outputs.run_attempt }}"
          graph = Path("release-subject-graph") / version / "release-subject-graph.json"
          matrix = json.loads(
              subprocess.check_output(
                  [
                      sys.executable,
                      "-c",
                      "import importlib.util,json,pathlib; "
                      "p=pathlib.Path('scripts/ci/validate-build-matrix.py'); "
                      "s=importlib.util.spec_from_file_location('m', p); "
                      "m=importlib.util.module_from_spec(s); s.loader.exec_module(m); "
                      "print(json.dumps(m.load_matrix(pathlib.Path('ci/build-matrix.yml'))))",
                  ],
                  text=True,
              )
          )
          raw_root = Path("release-security")
          raw_dir = raw_root / version / "raw"
          for scan in matrix.get("security_scans", []):
              report = raw_root / version / f"{scan}.json"
              if report.is_file():
                  continue
              raw = raw_dir / f"{scan}.json"
              meta_path = raw_dir / f"{scan}.metadata.json"
              if not raw.is_file() or not meta_path.is_file():
                  raise SystemExit(f"production-candidate scanner-native producer requires raw JSON and metadata for {scan}")
              meta = json.loads(meta_path.read_text(encoding="utf-8"))
              with tempfile.TemporaryDirectory() as tmp:
                  tmp = Path(tmp)
                  argv_path = tmp / "argv.json"
                  env_path = tmp / "env.json"
                  argv_path.write_text(json.dumps(meta["argv"], sort_keys=True), encoding="utf-8")
                  env_path.write_text(json.dumps(meta.get("env", {}), sort_keys=True), encoding="utf-8")
                  command = [
                      sys.executable,
                      "scripts/evidence/collect-scanner-native-evidence.py",
                      "create",
                      "--version",
                      version,
                      "--source-sha",
                      source_sha,
                      "--source-run-id",
                      source_run_id,
                      "--source-run-attempt",
                      source_run_attempt,
                      "--scan",
                      str(scan),
                      "--tool",
                      str(meta["tool"]),
                      "--tool-version",
                      str(meta["tool_version"]),
                      "--raw-json",
                      str(raw),
                      "--raw-path",
                      f"{version}/raw/{scan}.json",
                      "--raw-root",
                      str(raw_root),
                      "--scanner-binary-sha256",
                      str(meta["scanner_binary_sha256"]),
                      "--scanner-db-type",
                      str(meta["scanner_db_type"]),
                      "--scanner-db-version",
                      str(meta["scanner_db_version"]),
                      "--scanner-db-created-at",
                      str(meta["scanner_db_created_at"]),
                      "--scanner-db-digest",
                      str(meta["scanner_db_digest"]),
                      "--subject-id",
                      str(meta["subject_id"]),
                      "--subject-name",
                      str(meta["subject_name"]),
                      "--subject-role",
                      str(meta["subject_role"]),
                      "--subject-path",
                      str(meta["subject_path"]),
                      "--subject-sha256",
                      str(meta["subject_sha256"]),
                      "--subject-bytes",
                      str(meta["subject_bytes"]),
                      "--scan-mode",
                      str(meta["scan_mode"]),
                      "--argv-json",
                      str(argv_path),
                      "--env-json",
                      str(env_path),
                      "--subject-graph",
                      str(graph),
                      "--sbom-path",
                      str(meta["sbom_path"]),
                      "--sbom-sha256",
                      str(meta["sbom_sha256"]),
                      "--vex-path",
                      str(meta["vex_path"]),
                      "--vex-sha256",
                      str(meta["vex_sha256"]),
                      "--working-dir-policy",
                      str(meta.get("working_dir_policy", "repo-root")),
                      "--output-root",
                      str(raw_root),
                      "--check-files",
                  ]
                  subprocess.run(command, check=True)
          PY

      - name: Validate scanner-native security evidence
        if: ${{ inputs.profile == 'production-candidate' }}
        run: |
          set -euo pipefail
          python3 scripts/evidence/collect-scanner-native-evidence.py validate-directory \
            --version "${VERSION}" \
            --source-sha "${SOURCE_SHA}" \
            --source-run-id "${SOURCE_RUN_ID}" \
            --root release-security \
            --raw-root release-security \
            --check-files

      - name: Initialize technical dry-run skeletons
        if: ${{ inputs.profile == 'technical-dry-run' }}
        run: |
          set -euo pipefail
          python3 scripts/evidence/prepare-release-inputs.py init \
            --version "${VERSION}" \
            --source-run-id "${SOURCE_RUN_ID}" \
            --source-run-attempt "${{ steps.source.outputs.run_attempt }}" \
            --source-sha "${SOURCE_SHA}" \
            --profile "${PROFILE}" \
            --build-workflow-name "Image Build" \
            --build-workflow-path ".github/workflows/image-build.yml" \
            --image-build-contract "build-artifacts/image-build-contract/image-build-contract.json" \
            --artifact-root build-artifacts \
            --output-root .

      - name: Create release ingress manifest
        run: |
          set -euo pipefail
          mkdir -p "release-ingress/${VERSION}"
          python3 scripts/evidence/release-ingress.py create \
            --binding-manifest "release-inputs/${VERSION}/${PROFILE}.json" \
            --artifact-root build-artifacts \
            --input-root . \
            --output "release-ingress/${VERSION}/ingress-manifest.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow "Release Preflight" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --actor "${GITHUB_ACTOR}"
          cosign sign-blob \
            --yes \
            --output-signature="release-ingress/${VERSION}/ingress-manifest.json.sig" \
            --output-certificate="release-ingress/${VERSION}/ingress-manifest.json.cert" \
            "release-ingress/${VERSION}/ingress-manifest.json"

      - name: Validate release input contract
        run: |
          set -euo pipefail
          tier="production"
          case "${VERSION}" in
            *-*) tier="alpha" ;;
          esac
          args=(
            --version "${VERSION}"
            --release-tier "${tier}"
            --profile "${PROFILE}"
            --root .
            --binding-manifest "release-inputs/${VERSION}/${PROFILE}.json"
            --ingress-manifest "release-ingress/${VERSION}/ingress-manifest.json"
            --source-sha "${SOURCE_SHA}"
            --source-run-id "${SOURCE_RUN_ID}"
            --source-run-attempt "${{ steps.source.outputs.run_attempt }}"
            --artifact-root build-artifacts
          )
          if [ "${PROFILE}" = "rc-evidence-dry-run" ] || [ "${PROFILE}" = "release-candidate" ] || [ "${PROFILE}" = "production-candidate" ]; then
            args+=(--require-ingress-signature)
            args+=(--ingress-certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-preflight.yml@refs/heads/main")
            args+=(--ingress-certificate-oidc-issuer "https://token.actions.githubusercontent.com")
          fi
          if [ "${PROFILE}" = "release-candidate" ] || [ "${PROFILE}" = "production-candidate" ]; then
            evidence_ingress_identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-evidence-ingress.yml@refs/heads/main"
            args+=(--check-files)
            args+=(--require-evidence-ingress-signature)
            args+=(--evidence-ingress-certificate-identity "${evidence_ingress_identity}")
            args+=(--evidence-ingress-certificate-oidc-issuer "https://token.actions.githubusercontent.com")
          fi
          python3 scripts/evidence/validate-release-inputs.py "${args[@]}"

      - name: Upload preflight evidence bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-preflight-${{ inputs.profile }}-${{ inputs.version }}-${{ inputs.source_sha }}
          path: |
            source-run.json
            build-artifacts/
            release-inputs/
            release-ingress/
            release-lab-input/
            release-governance/
            release-runtime/
            release-signing/
            release-retention/
            release-ota/
            release-subject-graph/
            release-dry-run/
            release-approvals/
            release-security/
            release-reproducibility/
          retention-days: 30
          if-no-files-found: ignore
