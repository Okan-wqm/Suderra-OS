name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: './scripts'
          additional_files: |
            board/suderra/common/post-build.sh
            board/suderra/common/post-image.sh
            tests/**/*.sh

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !buildroot/**
            !output/**

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ci .github
          config_file: .yamllint.yml
          strict: false

  dco:
    name: DCO (Signed-off-by) Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO
        run: |
          git log --no-merges origin/main..HEAD --format="%H %s" | while read sha rest; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              echo "::error::Commit $sha missing Signed-off-by"
              exit 1
            fi
          done
