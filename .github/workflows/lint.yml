name: Lint

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]

permissions:
  contents: read

jobs:
  matrix-consistency:
    name: Build Matrix Contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Validate ci/build-matrix.yml
        run: python3 scripts/ci/validate-build-matrix.py validate

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2.1.2

  contract-tests:
    name: Image Contract + Installer Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.100.0
      - name: Run matrix contract tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh image-contracts
      - name: Run USB installer tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh installer

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: './scripts'
          additional_files: |
            board/suderra/common/post-build.sh
            board/suderra/common/post-image.sh
            board/suderra/common/rootfs-overlay/usr/sbin/*
            package/suderra-os-installer/suderra-os-install
            tests/**/*.sh

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@fa0cd0f1a052f54da593c83860f2292982f5d142
        with:
          globs: |
            **/*.md
            !buildroot/**
            !output/**

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pinned gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/gitleaks
          tar -xzf "${archive}" -C /tmp/gitleaks gitleaks
          sudo install -m 0755 /tmp/gitleaks/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --no-banner --redact

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ci .github
          config_file: .yamllint.yml
          strict: true

  dco:
    name: DCO (Signed-off-by) Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO
        run: |
          git log --no-merges origin/main..HEAD --format="%H %s" | while read -r sha rest; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              echo "::error::Commit $sha missing Signed-off-by"
              exit 1
            fi
          done
