name: Lint

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]

permissions:
  contents: read

jobs:
  matrix-consistency:
    name: Build Matrix Contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Validate ci/build-matrix.yml
        run: python3 scripts/ci/validate-build-matrix.py validate

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2.1.2

  contract-tests:
    name: Image Contract + Installer Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0
      - name: Run matrix contract tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh image-contracts
      - name: Run USB installer tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh installer

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: './scripts'
          additional_files: |
            board/suderra/common/post-build.sh
            board/suderra/common/post-image.sh
            board/suderra/common/rootfs-overlay/usr/sbin/*
            package/suderra-os-installer/suderra-os-install
            tests/**/*.sh

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !buildroot/**
            !output/**

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ci .github
          config_file: .yamllint.yml
          strict: true

  dco:
    name: DCO (Signed-off-by) Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO
        run: |
          git log --no-merges origin/main..HEAD --format="%H %s" | while read -r sha rest; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              echo "::error::Commit $sha missing Signed-off-by"
              exit 1
            fi
          done
