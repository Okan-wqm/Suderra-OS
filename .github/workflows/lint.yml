name: Lint

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]

permissions:
  contents: read

jobs:
  matrix-consistency:
    name: Build Matrix Contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate ci/build-matrix.yml
        run: python3 scripts/ci/validate-build-matrix.py validate

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7

  contract-tests:
    name: Image Contract + Installer Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@dd44c20b1206a46e25fba8503d5d7c9a33bd355a
      - name: Run matrix contract tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh image-contracts
      - name: Run USB installer tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh installer

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          severity: warning
          scandir: './scripts'
          additional_files: |
            board/suderra/common/post-build.sh
            board/suderra/common/post-image.sh
            board/suderra/common/rootfs-overlay/usr/sbin/*
            package/suderra-os-installer/suderra-os-install
            tests/**/*.sh

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            **/*.md
            !buildroot/**
            !output/**

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install pinned gitleaks CLI
        env:
          GH_TOKEN: ${{ github.token }}
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          gh release download "v${GITLEAKS_VERSION}" \
            --repo gitleaks/gitleaks \
            --pattern "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --dir /tmp \
            --clobber
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/gitleaks
          tar -xzf "${archive}" -C /tmp/gitleaks gitleaks
          sudo install -m 0755 /tmp/gitleaks/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --no-banner --redact

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c
        with:
          file_or_dir: ci .github
          config_file: .yamllint.yml
          strict: true

  dco:
    name: DCO (Signed-off-by) Check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Check DCO
        run: |
          git log --no-merges origin/main..HEAD --format="%H %s" | while read -r sha rest; do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              echo "::error::Commit $sha missing Signed-off-by"
              exit 1
            fi
          done
