name: Security Scan

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]
  schedule:
    # Her gece 03:00 UTC — yeni CVE'ler için
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Trivy binary
        env:
          TRIVY_VERSION: 0.70.0
          TRIVY_SHA256: 8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9
        run: |
          set -euo pipefail
          archive="/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o "${archive}"
          echo "${TRIVY_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/trivy
          tar -xzf "${archive}" -C /tmp/trivy trivy
          sudo install -m 0755 /tmp/trivy/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --skip-dirs buildroot,output,dl \
            --exit-code 1 \
            .
      - name: Validate SARIF
        id: validate_trivy_fs_sarif
        if: always() && hashFiles('trivy-fs.sarif') != ''
        run: python3 scripts/ci/validate-sarif.py trivy-fs.sarif

      - name: Upload SARIF
        if: always() && steps.validate_trivy_fs_sarif.outcome == 'success'
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  trivy-config:
    name: Trivy (config / Dockerfile)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Trivy binary
        env:
          TRIVY_VERSION: 0.70.0
          TRIVY_SHA256: 8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9
        run: |
          set -euo pipefail
          archive="/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o "${archive}"
          echo "${TRIVY_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/trivy
          tar -xzf "${archive}" -C /tmp/trivy trivy
          sudo install -m 0755 /tmp/trivy/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run Trivy config scan
        run: |
          trivy config \
            --format sarif \
            --output trivy-config.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 1 \
            .
      - name: Validate SARIF
        id: validate_trivy_config_sarif
        if: always() && hashFiles('trivy-config.sarif') != ''
        run: python3 scripts/ci/validate-sarif.py trivy-config.sarif

      - name: Upload SARIF
        if: always() && steps.validate_trivy_config_sarif.outcome == 'success'
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install pinned gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/gitleaks
          tar -xzf "${archive}" -C /tmp/gitleaks gitleaks
          sudo install -m 0755 /tmp/gitleaks/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --no-banner --redact

  grype-fs:
    name: Grype (filesystem)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Grype
        env:
          GRYPE_VERSION: 0.112.0
          GRYPE_SHA256: acb14a030010fe9bdb9594b4ae108d9d14ef2f926d936aa0916dc62c89c058ea
        run: |
          set -euo pipefail
          archive="/tmp/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -fsSL \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" \
            -o "${archive}"
          echo "${GRYPE_SHA256}  ${archive}" | sha256sum -c -
          mkdir -p /tmp/grype
          tar -xzf "${archive}" -C /tmp/grype grype
          sudo install -m 0755 /tmp/grype/grype /usr/local/bin/grype
          grype version
          grype db update
      - name: Run Grype scan
        run: |
          set -euo pipefail
          grype dir:. \
            -o sarif \
            --file results.sarif \
            --fail-on high \
            --only-fixed
      - name: Validate SARIF
        id: validate_grype_sarif
        if: always() && hashFiles('results.sarif') != ''
        run: python3 scripts/ci/validate-sarif.py results.sarif
      - name: Upload SARIF
        if: always() && steps.validate_grype_sarif.outcome == 'success'
        uses: github/codeql-action/upload-sarif@7c1e4cf0b20d7c1872b26569c00ba908797a59bf
        with:
          sarif_file: results.sarif
          category: grype-fs

  vex-json:
    name: VEX JSON syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate OpenVEX JSON files
        run: |
          set -euo pipefail
          for vex in vex/*.json; do
            [ -f "$vex" ] || continue
            python3 -m json.tool "$vex" >/dev/null
          done
