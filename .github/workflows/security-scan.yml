name: Security Scan

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]
  schedule:
    # Her gece 03:00 UTC — yeni CVE'ler için
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy binary
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          KEY_URL="https://aquasecurity.github.io/trivy-repo/deb/public.key"
          REPO_URL="https://aquasecurity.github.io/trivy-repo/deb"
          wget -qO - "${KEY_URL}" | \
            sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] ${REPO_URL} $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --skip-dirs buildroot,output,dl \
            --ignore-unfixed \
            --exit-code 0 \
            .

      - name: Upload SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  trivy-config:
    name: Trivy (config / Dockerfile)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy binary
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          KEY_URL="https://aquasecurity.github.io/trivy-repo/deb/public.key"
          REPO_URL="https://aquasecurity.github.io/trivy-repo/deb"
          wget -qO - "${KEY_URL}" | \
            sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] ${REPO_URL} $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy config scan
        run: |
          trivy config \
            --format sarif \
            --output trivy-config.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            .

      - name: Upload SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom-diff:
    name: SBOM Diff (release-to-release)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Faz 5'te aktif olur
        run: echo "::notice::SBOM diff Faz 5'te eklenecek"
