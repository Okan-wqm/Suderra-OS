name: Security Scan

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]
  schedule:
    # Her gece 03:00 UTC — yeni CVE'ler için
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy binary
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          KEY_URL="https://aquasecurity.github.io/trivy-repo/deb/public.key"
          REPO_URL="https://aquasecurity.github.io/trivy-repo/deb"
          wget -qO - "${KEY_URL}" | \
            sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] ${REPO_URL} $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --skip-dirs buildroot,output,dl \
            --exit-code 1 \
            .

      - name: Upload SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  trivy-config:
    name: Trivy (config / Dockerfile)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy binary
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          KEY_URL="https://aquasecurity.github.io/trivy-repo/deb/public.key"
          REPO_URL="https://aquasecurity.github.io/trivy-repo/deb"
          wget -qO - "${KEY_URL}" | \
            sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] ${REPO_URL} $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy config scan
        run: |
          trivy config \
            --format sarif \
            --output trivy-config.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 1 \
            .

      - name: Upload SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  grype-fs:
    name: Grype (filesystem)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Grype
        run: |
          set -euo pipefail
          curl -sSfL \
            https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            -o /tmp/install-grype.sh
          sudo sh /tmp/install-grype.sh -b /usr/local/bin
          grype version
          grype db update
      - name: Run Grype scan
        run: |
          set -euo pipefail
          grype dir:. \
            -o sarif \
            --file results.sarif \
            --fail-on high \
            --only-fixed
      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: grype-fs

  vex-json:
    name: VEX JSON syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Validate OpenVEX JSON files
        run: |
          set -euo pipefail
          for vex in vex/*.json; do
            [ -f "$vex" ] || continue
            python3 -m json.tool "$vex" >/dev/null
          done
