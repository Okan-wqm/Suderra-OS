name: Build

on:
  push:
    branches: [main, "claude/**"]
    tags: ['v*']
  pull_request:
    branches: [main, "claude/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.defconfig }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        defconfig:
          - suderra_qemu_x86_64_defconfig
          - suderra_aarch64_rpi4_defconfig
          - suderra_aarch64_rpi4_usb_installer_defconfig
          - suderra_aarch64_revpi4_defconfig
          # Faz 2-B/C'de aktif olur:
          # - suderra_x86_64_defconfig
    steps:
      - name: Show runner environment
        run: |
          set -euo pipefail
          set -x
          uname -a
          df -h
          free -h
          docker --version
          ls -la /dev/kvm 2>&1 || echo "no /dev/kvm"
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: dl/
          key: br-dl-${{ hashFiles('buildroot/.version', 'configs/${{ matrix.defconfig }}') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache/
          key: ccache-${{ matrix.defconfig }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.defconfig }}-

      - name: Verify submodule + paths
        run: |
          set -euo pipefail
          set -x
          ls -la
          git submodule status
          ls buildroot/ | head -10
          ls configs/
          head -5 "configs/${{ matrix.defconfig }}"

      - name: Build container
        run: |
          set -euo pipefail
          set -x
          docker build -t suderra-builder ci/ 2>&1 | tail -20

      - name: Buildroot defconfig parse (smoke test)
        run: |
          set -euo pipefail
          set -x
          # Önce sadece defconfig parse edebiliyor muyuz?
          make -C buildroot \
            BR2_EXTERNAL="$(pwd)" \
            O="$(pwd)/output/${{ matrix.defconfig }}" \
            "${{ matrix.defconfig }}" 2>&1 | tail -30

      - name: Build image (full Buildroot run)
        run: |
          set -euo pipefail
          set -x
          if [ -s "configs/${{ matrix.defconfig }}" ] && grep -q "^BR2_" "configs/${{ matrix.defconfig }}"; then
            if [ "${{ matrix.defconfig }}" = "suderra_aarch64_rpi4_usb_installer_defconfig" ]; then
              mkdir -p .ci-installer-keys
              openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:3072 \
                -out .ci-installer-keys/installer-payload.key
              openssl rsa -in .ci-installer-keys/installer-payload.key \
                -pubout -out .ci-installer-keys/installer-payload.pub.pem
              chmod 0644 .ci-installer-keys/installer-payload.key .ci-installer-keys/installer-payload.pub.pem
              export SUDERRA_INSTALLER_PAYLOAD_SIGN_KEY=/workspace/.ci-installer-keys/installer-payload.key
              export SUDERRA_INSTALLER_PAYLOAD_PUBKEY=/workspace/.ci-installer-keys/installer-payload.pub.pem
              ./scripts/build-in-docker.sh suderra_aarch64_rpi4_defconfig 2>&1 | tail -200
              export SUDERRA_TARGET_IMAGE_XZ=/workspace/output/suderra_aarch64_rpi4_defconfig/images/suderra-rpi4-target.img.xz
            fi
            ./scripts/build-in-docker.sh "${{ matrix.defconfig }}" 2>&1 | tail -200
          else
            echo "::error::Defconfig ${{ matrix.defconfig }} missing or empty"
            exit 1
          fi

      - name: Upload image artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.defconfig }}-image
          path: output/${{ matrix.defconfig }}/images/
          retention-days: 30
          if-no-files-found: error

  qemu-smoke-test:
    name: QEMU boot smoke test
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + OVMF
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf

      - name: KVM acceleration check
        run: |
          set -euo pipefail
          # GitHub runner'larda /dev/kvm var mı? Varsa hızlı, yoksa TCG (yavaş)
          if [ -e /dev/kvm ]; then
            echo "==> /dev/kvm mevcut — KVM acceleration aktif"
            ls -la /dev/kvm
          else
            echo "::warning::/dev/kvm yok — QEMU TCG modunda yavaş çalışacak"
          fi

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: suderra_qemu_x86_64_defconfig-image
          path: output/suderra_qemu_x86_64_defconfig/images/
        continue-on-error: true

      - name: Run boot smoke test
        env:
          BOOT_TEST_TIMEOUT: 180   # CI'da TCG fallback için cömert
        run: |
          set -euo pipefail
          if [ ! -f output/suderra_qemu_x86_64_defconfig/images/disk.img ]; then
            echo "::error::Image artifact yok"
            exit 1
          fi
          ./tests/qemu/boot-test.sh suderra_qemu_x86_64_defconfig

      - name: Upload boot logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-logs
          path: /tmp/suderra-boot-test-*.log
          retention-days: 7
          if-no-files-found: ignore
