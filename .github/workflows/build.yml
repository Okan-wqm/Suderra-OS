name: Build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main, "claude/**"]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: build-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Build matrix contract
    runs-on: ubuntu-24.04
    outputs:
      fast_matrix: ${{ steps.matrix.outputs.fast_matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Validate build matrix
        run: python3 scripts/ci/validate-build-matrix.py validate
      - name: Emit fast matrix
        id: matrix
        run: |
          set -euo pipefail
          echo "fast_matrix=$(python3 scripts/ci/validate-build-matrix.py github-matrix --selector fast_required)" >> "$GITHUB_OUTPUT"

  syntax-and-contracts:
    name: Syntax and workflow contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
      - name: Python syntax checks
        run: |
          set -euo pipefail
          python3 -B -m py_compile \
            scripts/ci/validate-build-matrix.py \
            scripts/ci/buildroot-build-evidence.py \
            scripts/ci/payload-inputs-manifest.py \
            scripts/ci/package-usb-installer-payload.py \
            scripts/ci/usb-installer-base-manifest.py \
            scripts/ci/image-build-contract.py \
            scripts/ci/build-performance-budget.py \
            scripts/evidence/prepare-release-inputs.py \
            scripts/evidence/validate-release-inputs.py \
            scripts/evidence/operator-evidence-ingress.py \
            scripts/evidence/release-ingress.py \
            scripts/evidence/validate-release-artifact-binding.py
      - name: Shell syntax checks
        run: |
          set -euo pipefail
          bash -n scripts/build-in-docker.sh
          bash -n scripts/build.sh
          bash -n scripts/ci/free-runner-disk.sh
          bash -n scripts/ci/prepare-ci-keyring.sh
          bash -n scripts/ci/validate-trust-roots.sh
          bash -n board/suderra/common/post-image.sh
      - name: Validate image contract tests
        env:
          SUDERRA_FAIL_ON_SKIP: "1"
        run: ./scripts/run-tests.sh image-contracts

  defconfig-smoke:
    name: Buildroot defconfig parse smoke (${{ matrix.name }})
    needs: matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.fast_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive
      - name: Verify submodule pin and native Rust contract
        run: |
          set -euo pipefail
          expected_sha="$(git ls-tree HEAD buildroot | awk '{print $3}')"
          actual_sha="$(git -C buildroot rev-parse HEAD)"
          if [ "${expected_sha}" != "${actual_sha}" ]; then
            echo "::error::Buildroot submodule SHA drift detected"
            exit 1
          fi
          ./scripts/buildroot-source.sh verify-native-rust
      - name: Buildroot defconfig parse
        run: |
          set -euo pipefail
          output_dir="${RUNNER_TEMP}/suderra-smoke/${{ matrix.defconfig }}"
          buildroot_source_dir="$(./scripts/buildroot-source.sh prepare --defconfig "${{ matrix.defconfig }}-fast-smoke")"
          make -C "${buildroot_source_dir}" \
            BR2_EXTERNAL="$(pwd)" \
            O="${output_dir}" \
            "${{ matrix.defconfig }}" 2>&1 | tail -60
