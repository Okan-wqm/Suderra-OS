name: Build

on:
  push:
    branches: [main, "claude/**"]
    tags: ['v*']
  pull_request:
    branches: [main, "claude/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix:
    name: Build matrix contract
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      qemu_matrix: ${{ steps.matrix.outputs.qemu_matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate build matrix
        run: python3 scripts/ci/validate-build-matrix.py validate
      - name: Emit dynamic matrices
        id: matrix
        run: |
          set -euo pipefail
          echo "build_matrix=$(python3 scripts/ci/validate-build-matrix.py github-matrix --selector ci_build)" >> "$GITHUB_OUTPUT"
          echo "qemu_matrix=$(python3 scripts/ci/validate-build-matrix.py github-matrix --selector qemu_test)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.build_matrix) }}
    steps:
      - name: Show runner environment
        run: |
          set -euo pipefail
          set -x
          uname -a
          df -h
          free -h
          docker --version
          ls -la /dev/kvm 2>&1 || echo "no /dev/kvm"
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check runner resource contract
        run: ./scripts/ci/check-runner-resources.sh

      - name: Cache Buildroot downloads
        uses: actions/cache@v5
        with:
          path: dl/
          key: br-dl-${{ hashFiles('buildroot/.version', format('configs/{0}', matrix.defconfig)) }}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache/
          key: ccache-${{ matrix.defconfig }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.defconfig }}-

      - name: Verify submodule + paths
        run: |
          set -euo pipefail
          set -x
          ls -la
          git submodule status
          find buildroot -maxdepth 1 -mindepth 1 -printf '%f\n' | sort | head -10
          find configs -maxdepth 1 -type f -printf '%f\n' | sort
          head -5 "configs/${{ matrix.defconfig }}"

      - name: Build container
        run: |
          set -euo pipefail
          set -x
          docker build -t suderra-builder ci/ 2>&1 | tail -20

      - name: Buildroot defconfig parse (smoke test)
        run: |
          set -euo pipefail
          set -x
          # Önce sadece defconfig parse edebiliyor muyuz?
          make -C buildroot \
            BR2_EXTERNAL="$(pwd)" \
            O="$(pwd)/output/${{ matrix.defconfig }}" \
            "${{ matrix.defconfig }}" 2>&1 | tail -30

      - name: Build image (full Buildroot run)
        run: |
          set -euo pipefail
          set -x
          mkdir -p build-logs
          build_and_check() {
            local defconfig="$1"
            local log_path="build-logs/${defconfig}.log"
            ./scripts/build-in-docker.sh "${defconfig}" 2>&1 | tee "${log_path}"
            python3 scripts/ci/classify-build-warnings.py \
              --json-output "build-logs/${defconfig}.warnings.json" \
              "${log_path}"
          }
          if [ -s "configs/${{ matrix.defconfig }}" ] && grep -q "^BR2_" "configs/${{ matrix.defconfig }}"; then
            if [ "${{ matrix.defconfig }}" = "suderra_aarch64_rpi4_usb_installer_defconfig" ]; then
              mkdir -p .ci-installer-keys
              openssl genpkey -algorithm ED25519 \
                -out .ci-installer-keys/installer-payload.key
              openssl pkey -in .ci-installer-keys/installer-payload.key \
                -pubout -out .ci-installer-keys/installer-payload.pub.pem
              chmod 0600 .ci-installer-keys/installer-payload.key
              chmod 0644 .ci-installer-keys/installer-payload.pub.pem
              export SUDERRA_INSTALLER_PAYLOAD_SIGN_KEY=/workspace/.ci-installer-keys/installer-payload.key
              export SUDERRA_INSTALLER_PAYLOAD_PUBKEY=/workspace/.ci-installer-keys/installer-payload.pub.pem
              build_and_check suderra_aarch64_rpi4_defconfig
              build_and_check suderra_aarch64_revpi4_defconfig
              export SUDERRA_RPI4_TARGET_IMAGE_XZ=/workspace/output/suderra_aarch64_rpi4_defconfig/images/suderra-rpi4-target.img.xz
              export SUDERRA_REVPI4_TARGET_IMAGE_XZ=/workspace/output/suderra_aarch64_revpi4_defconfig/images/suderra-revpi4-target.img.xz
            fi
            build_and_check "${{ matrix.defconfig }}"
          else
            echo "::error::Defconfig ${{ matrix.defconfig }} missing or empty"
            exit 1
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.defconfig }}-build-logs
          path: build-logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Verify image contract artifact
        run: |
          set -euo pipefail
          python3 scripts/ci/validate-build-matrix.py verify-artifacts \
            --defconfig "${{ matrix.defconfig }}" \
            --images-dir "output/${{ matrix.defconfig }}/images"

      - name: Upload image artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.defconfig }}-image
          path: output/${{ matrix.defconfig }}/images/
          retention-days: 30
          if-no-files-found: error

  qemu-smoke-test:
    name: QEMU boot smoke test (${{ matrix.name }})
    needs: [matrix, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.qemu_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU + OVMF
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf

      - name: KVM acceleration check
        run: |
          set -euo pipefail
          # GitHub runner'larda /dev/kvm var mı? Varsa hızlı, yoksa TCG (yavaş)
          if [ -e /dev/kvm ]; then
            echo "==> /dev/kvm mevcut — KVM acceleration aktif"
            ls -la /dev/kvm
          else
            echo "::warning::/dev/kvm yok — QEMU TCG modunda yavaş çalışacak"
          fi

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.defconfig }}-image
          path: output/${{ matrix.defconfig }}/images/

      - name: Run boot smoke test
        env:
          BOOT_TEST_TIMEOUT: 180   # CI'da TCG fallback için cömert
        run: |
          set -euo pipefail
          if [ ! -f "output/${{ matrix.defconfig }}/images/${{ matrix.artifact }}" ]; then
            echo "::error::Image artifact yok"
            exit 1
          fi
          ./tests/qemu/boot-test.sh "${{ matrix.defconfig }}"

      - name: Upload boot logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: boot-test-logs
          path: output/qemu-boot-logs/
          retention-days: 7
          if-no-files-found: ignore
