name: QEMU x86_64 Production Runtime Evidence

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to bind into release-runtime evidence"
        required: true
        type: string
      source_sha:
        description: "Exact commit SHA to test"
        required: true
        type: string
      source_run_id:
        description: "Image Build workflow run id that produced the release subject"
        required: true
        type: string
      source_run_attempt:
        description: "Image Build workflow run attempt that produced the release subject"
        required: true
        type: string
      compressed_artifact_sha256:
        description: "Compressed release artifact digest from the release input binding"
        required: true
        type: string
      raw_image_sha256:
        description: "Raw disk image digest from the release input binding"
        required: true
        type: string
      release_artifact:
        description: "Compressed release artifact name from ci/build-matrix.yml"
        required: true
        type: string

# Manually triggered (needs the built prod-ab image + HSM signing cert). The
# per-PR fast checks that guard the same machinery are secureboot-enroll.yml,
# runtime-mutations.yml, and the image-contract suite.
permissions:
  contents: read
  actions: read

concurrency:
  group: qemu-x86_64-prod-ab-runtime-${{ inputs.version }}-${{ inputs.source_sha }}-${{ inputs.source_run_id }}
  cancel-in-progress: false

jobs:
  qemu-x86_64-prod-ab:
    name: qemu-x86_64-prod-ab production-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    environment:
      name: production-runtime
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.source_sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Validate source binding
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.source_sha }}"
          python3 scripts/ci/validate-build-matrix.py validate

      - name: Install QEMU Secure Boot runtime tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ovmf \
            qemu-utils \
            qemu-system-x86 \
            swtpm \
            sbsigntool \
            cryptsetup-bin \
            python3-virt-firmware \
            mtools \
            util-linux \
            binutils

      - name: Build production-runtime image
        env:
          SUDERRA_VARIANT: prod
          SUDERRA_RELEASE_TIER: production
          SUDERRA_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ./scripts/build.sh suderra_qemu_x86_64_prod_ab_defconfig

      - name: Provision enrolled OVMF and swtpm state
        env:
          SUDERRA_SECUREBOOT_SIGNING_CERT: ${{ secrets.SUDERRA_SECUREBOOT_SIGNING_CERT_PEM }}
        run: |
          set -euo pipefail
          mkdir -p runtime-inputs/swtpm-state runtime-inputs/sb-keys
          cp /usr/share/OVMF/OVMF_CODE_4M.secboot.fd runtime-inputs/OVMF_CODE.secboot.fd
          cp /usr/share/OVMF/OVMF_VARS_4M.fd runtime-inputs/OVMF_VARS.fd

          # db = UKI'yi imzalayan sertifika. Prod'da imzalama sertifikası (public)
          # secret'tan gelir; yoksa build'in imzaladığı cert'i kullan.
          db_cert="runtime-inputs/sb-keys/db.crt"
          if [ -n "${SUDERRA_SECUREBOOT_SIGNING_CERT:-}" ]; then
            printf '%s\n' "${SUDERRA_SECUREBOOT_SIGNING_CERT}" > "${db_cert}"
          elif [ -f "${SUDERRA_SECUREBOOT_SIGNING_CERT_FILE:-/nonexistent}" ]; then
            cp "${SUDERRA_SECUREBOOT_SIGNING_CERT_FILE}" "${db_cert}"
          else
            echo "ERROR: SUDERRA_SECUREBOOT_SIGNING_CERT(_FILE) sağlanmalı — enrollment db cert'i imzalama cert'iyle eşleşmeli" >&2
            exit 1
          fi

          # PK/KEK: sanal firmware'in güven deposunu yöneten platform anahtarları;
          # bu test firmware'i için efemer self-signed yeterli (db güven kökünü korurlar).
          openssl req -newkey rsa:3072 -nodes -keyout runtime-inputs/sb-keys/pk.key \
            -x509 -sha256 -days 3 -out runtime-inputs/sb-keys/pk.crt -subj "/CN=Suderra QEMU PK/" 2>/dev/null
          openssl req -newkey rsa:3072 -nodes -keyout runtime-inputs/sb-keys/kek.key \
            -x509 -sha256 -days 3 -out runtime-inputs/sb-keys/kek.crt -subj "/CN=Suderra QEMU KEK/" 2>/dev/null

          ./scripts/qemu/enroll-secureboot-vars \
            --input runtime-inputs/OVMF_VARS.fd \
            --output runtime-inputs/OVMF_VARS.enrolled.fd \
            --pk runtime-inputs/sb-keys/pk.crt \
            --kek runtime-inputs/sb-keys/kek.crt \
            --db "${db_cert}" \
            --manifest runtime-inputs/ovmf-enrollment.json

          swtpm socket \
            --tpm2 \
            --tpmstate dir=runtime-inputs/swtpm-state \
            --ctrl type=unixio,path=runtime-inputs/swtpm.ctrl \
            --server type=unixio,path=runtime-inputs/swtpm.sock \
            --daemon

      - name: Run production-runtime scenario suite
        run: |
          set -euo pipefail
          mkdir -p "release-runtime/${{ inputs.version }}/qemu-x86_64-prod-ab"
          test "$(sha256sum output/suderra_qemu_x86_64_prod_ab_defconfig/images/disk.img | awk '{print $1}')" = "${RAW_IMAGE_SHA256}"
          enrolled_vars_sha256="$(python3 -c 'import json,sys;print(json.load(open("runtime-inputs/ovmf-enrollment.json"))["enrolled_vars_sha256"])')"
          secure_boot_db_sha256="$(python3 -c 'import json,sys;print(json.load(open("runtime-inputs/ovmf-enrollment.json"))["secure_boot_db_sha256"])')"
          enrollment_mode="$(python3 -c 'import json,sys;print(json.load(open("runtime-inputs/ovmf-enrollment.json"))["mode"])')"
          # Derive real per-scenario mutation producer inputs from the built image.
          python3 scripts/qemu/derive-mutation-inputs.py \
            --image output/suderra_qemu_x86_64_prod_ab_defconfig/images/disk.img \
            --binaries-dir output/suderra_qemu_x86_64_prod_ab_defconfig/images \
            --keys-dir "${SUDERRA_KEYS_DIR:-${HOME}/.suderra-keys/dev}" \
            --swtpm-state runtime-inputs/swtpm-state \
            --rollback-floor "${SUDERRA_ROLLBACK_FLOOR:-${VERSION}}" \
            --downgrade-version "${SUDERRA_DOWNGRADE_VERSION:-0.0.1}" \
            --output runtime-inputs/mutation-inputs.json
          python3 scripts/evidence/evidence_contract.py runtime-plan \
            --version "${VERSION}" \
            --target qemu-x86_64-prod-ab \
            --source-sha "${SOURCE_SHA}" \
            --source-run-id "${SOURCE_RUN_ID}" \
            --source-run-attempt "${SOURCE_RUN_ATTEMPT}" \
            --defconfig suderra_qemu_x86_64_prod_ab_defconfig \
            --image output/suderra_qemu_x86_64_prod_ab_defconfig/images/disk.img \
            --raw-image-sha256 "${RAW_IMAGE_SHA256}" \
            --compressed-artifact-sha256 "${COMPRESSED_ARTIFACT_SHA256}" \
            --release-artifact "${RELEASE_ARTIFACT}" \
            --ovmf-code runtime-inputs/OVMF_CODE.secboot.fd \
            --ovmf-vars runtime-inputs/OVMF_VARS.enrolled.fd \
            --ovmf-enrollment-mode "${enrollment_mode}" \
            --ovmf-enrolled-vars-sha256 "${enrolled_vars_sha256}" \
            --secure-boot-db-sha256 "${secure_boot_db_sha256}" \
            --mutation-inputs-file runtime-inputs/mutation-inputs.json \
            --swtpm-state runtime-inputs/swtpm-state \
            --scenario-command tests/qemu/production-runtime-scenario.sh \
            > runtime-plan.json
          python3 tests/qemu/production-runtime.py create \
            --plan runtime-plan.json \
            --output "release-runtime/${{ inputs.version }}/qemu-x86_64-prod-ab/production-runtime.json"
          python3 scripts/evidence/validate-production-runtime-suite.py \
            "release-runtime/${{ inputs.version }}/qemu-x86_64-prod-ab/production-runtime.json" \
            --require-pass \
            --profile production-runtime \
            --check-files \
            --expected-version "${{ inputs.version }}" \
            --expected-target qemu-x86_64-prod-ab \
            --expected-source-sha "${{ inputs.source_sha }}" \
            --expected-source-run-id "${{ inputs.source_run_id }}" \
            --expected-source-run-attempt "${{ inputs.source_run_attempt }}" \
            --expected-defconfig suderra_qemu_x86_64_prod_ab_defconfig \
            --expected-raw-image-sha256 "${{ inputs.raw_image_sha256 }}" \
            --expected-compressed-artifact-sha256 "${{ inputs.compressed_artifact_sha256 }}" \
            --expected-release-artifact "${{ inputs.release_artifact }}"
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_RUN_ATTEMPT: ${{ inputs.source_run_attempt }}
          RAW_IMAGE_SHA256: ${{ inputs.raw_image_sha256 }}
          COMPRESSED_ARTIFACT_SHA256: ${{ inputs.compressed_artifact_sha256 }}
          RELEASE_ARTIFACT: ${{ inputs.release_artifact }}

      - name: Upload production runtime evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-runtime-${{ inputs.version }}-${{ inputs.source_sha }}-qemu-x86_64-prod-ab
          path: release-runtime/
          retention-days: 30
          if-no-files-found: error
