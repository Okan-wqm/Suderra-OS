version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5
    ignore:
      # The dtolnay action ref is also the Rust toolchain selector. Dependabot
      # can find generated refs that do not exist in rustup yet.
      - dependency-name: "dtolnay/rust-toolchain"

  # Docker (CI builder)
  - package-ecosystem: "docker"
    directory: "/ci"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "build"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 3

  # Rust workspace (userspace/) — Faz 1.5'te aktif
  - package-ecosystem: "cargo"
    directory: "/userspace"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "rust"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 10
    # Grup minor+patch için tek PR (CVE patch'ler ayrı kalır)
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Major bump'lar manuel review gerektirir
    ignore:
      - dependency-name: "tokio"
        update-types: ["version-update:semver-major"]
      - dependency-name: "axum"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rustls"
        update-types: ["version-update:semver-major"]

  # Faz 2'de eklenince: suderra-edge-agent kendi repo'sundan vendored
  # - package-ecosystem: "cargo"
  #   directory: "/package/suderra-edge-agent"
  #   schedule: { interval: "daily" }
  #   labels: ["dependencies", "rust", "security", "edge-agent"]

  # Faz 1 sonu: git submodule (Buildroot) updates
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "buildroot"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 2
