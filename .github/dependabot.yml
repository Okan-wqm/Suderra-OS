version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5

  # Docker (CI builder)
  - package-ecosystem: "docker"
    directory: "/ci"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "build"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 3

