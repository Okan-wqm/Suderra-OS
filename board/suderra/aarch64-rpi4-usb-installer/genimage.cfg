# Suderra OS — Raspberry Pi 4 / CM4 USB installer image layout
#
# Partition 1: Pi boot firmware
# Partition 2: installer rootfs
# Partition 3: signed payload containing the compressed target image

image boot.vfat {
  vfat {
    label = "SUDRBOOT"
    files = {
      "bcm2711-rpi-4-b.dtb",
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/cmdline.txt",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf",
      "Image"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}

image payload.ext4 {
  ext4 {
    label = "SUDERRA-PAYLOAD"
  }
  size = 1536M
  mountpoint = "/"
}

image suderra-pi-cm4-revpi-usb-installer.img {
  hdimage {
    partition-table-type = "mbr"
  }

  partition boot {
    partition-type = 0xC
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.ext4"
  }

  partition payload {
    partition-type = 0x83
    image = "payload.ext4"
  }
}
