# Suderra OS — Raspberry Pi 4 / CM4 USB installer base artifacts
#
# Base mode intentionally creates only the boot partition image. Buildroot
# creates rootfs.ext4 directly; payload assembly later combines both with the
# signed payload partition.

image boot.vfat {
  vfat {
    label = "SUDRBOOT"
    files = {
      "bcm2711-rpi-4-b.dtb",
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/cmdline.txt",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf",
      "Image"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}
