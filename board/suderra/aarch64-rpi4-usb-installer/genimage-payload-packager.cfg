# Suderra OS — Raspberry Pi 4 / CM4 USB installer payload assembly layout
#
# boot.vfat and rootfs.ext4 are consumed from the installer base artifact.
# payload.ext4 is generated from the signed payload root for this run.

image payload.ext4 {
  ext4 {
    label = "SUDERRA-PAYLOAD"
  }
  size = 1536M
  mountpoint = "/"
}

image suderra-pi-cm4-revpi-usb-installer.img {
  hdimage {
    partition-table-type = "mbr"
  }

  partition boot {
    partition-type = 0xC
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.ext4"
  }

  partition payload {
    partition-type = 0x83
    image = "payload.ext4"
  }
}
