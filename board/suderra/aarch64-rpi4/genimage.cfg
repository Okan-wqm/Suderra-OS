# Suderra OS — Raspberry Pi 4 / CM4 SD card image layout
#
# Bu dosya `genimage` tarafından okunur ve binaries/sdcard.img üretir.
# Çıktıyı SD karta `dd if=sdcard.img of=/dev/sdX bs=4M` ile yazarsın
# (veya scripts/flash-sd.sh güvenli wrapper'ı).
#
# Disk layout (MBR partition table):
#   +---------------------------------+
#   | Partition 1: /boot  (vfat, 256MB, bootable)  |
#   |   - Pi firmware (start4.elf, bootcode.bin, ...)
#   |   - Linux kernel (Image)
#   |   - Device trees (bcm2711-*.dtb)
#   |   - DT overlays (overlays/*.dtbo)
#   |   - config.txt, cmdline.txt
#   +---------------------------------+
#   | Partition 2: /     (ext4, ~512MB)            |
#   |   - rootfs.ext4 — Suderra OS root filesystem
#   +---------------------------------+
#   | Free space (Faz 3'te:)                       |
#   |   - Partition 3: rootfs B (A/B OTA için)     |
#   |   - Partition 4: /data (mutable, ext4)       |
#   +---------------------------------+
#
# Referans: https://github.com/pengutronix/genimage
#

image boot.vfat {
  vfat {
    label = "SUDERRA-BOOT"
    files = {
      "bcm2711-rpi-4-b.dtb",
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/cmdline.txt",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf",
      "Image"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}

image data.ext4 {
  ext4 {
    label = "SUDERRA-DATA"
  }
  size = 512M
}

image suderra-rpi4-target.img {
  hdimage {
    partition-table-type = "msdos"
  }

  partition boot {
    partition-type = 0xC
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.ext4"
  }

  partition data {
    partition-type = 0x83
    image = "data.ext4"
  }
}
