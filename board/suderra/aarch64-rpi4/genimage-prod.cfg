# Suderra OS — Raspberry Pi 4 / CM4 PRODUCTION disk layout (ADR-0007)
#
# GPT A/B + dm-verity + LUKS2 /data. Yalnız PROD variant post-image tarafından
# seçilir (dev build MBR aarch64-rpi4/genimage.cfg kullanmaya devam eder — bkz.
# board/suderra/common/post-image.sh). GPT partlabel'ları RAUC'un
# by-partlabel slot tanımlarıyla eşleşir (package/suderra-rauc-config).
#
# Boot zinciri (ADR-0007):
#   Pi firmware (start4.elf) -> config.txt (kernel=u-boot.bin) -> U-Boot
#     -> boot.scr (RAUC slot seçimi) -> imzalı suderra-<slot>.fit
#     -> dm-verity rootfs (RO) -> systemd
#
# Boot partition (GPT #1, ESP-tipi FAT): Pi firmware + u-boot.bin +
# u-boot.dtb (gömülü FIT pubkey) + config.txt + boot.scr + suderra-A/B.fit +
# DTB'ler + overlays. Image/cmdline.txt YOK (kernel+bootargs imzalı FIT içinde).

image boot.vfat {
  vfat {
    label = "SUDRBOOT"
    files = {
      "u-boot.bin",
      "u-boot.dtb",
      "boot.scr",
      "suderra-A.fit",
      "suderra-B.fit",
      "bcm2711-rpi-4-b.dtb",
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}

image suderra-rpi4-target.img {
  hdimage {
    partition-table-type = "gpt"
    gpt-location = 32K
  }

  partition boot {
    partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs-a {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    image = "rootfs.ext4"
    size = 512M
  }

  partition rootfs-a-verity {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    image = "rootfs.verity"
    size = 64M
  }

  partition rootfs-b {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    # İlk imajda B slot boş — RAUC ilk update'te doldurur
    size = 512M
  }

  partition rootfs-b-verity {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    # İlk imajda B verity slot boş — RAUC ilk update'te doldurur
    size = 64M
  }

  partition data {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    # Production runtime bunu ilk boot'ta LUKS2 olarak provision eder
    # (suderra-data-provision, RT-1). Anahtar custody DEFAULT TPM2-seal'dir
    # (donanım kökü); TPM'siz board'da provisioning fail-closed olur — zayıf
    # keyfile tier YALNIZ açık SUDERRA_DATA_KEY_MODE=keyfile opt-in'iyle (ADR-0008).
    # Düz ext4 olarak SEVK EDİLMEZ (ham/formatsız gelir, boot'ta şifrelenir).
    size = 2G
  }
}
