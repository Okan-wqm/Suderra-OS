#!/usr/sbin/nft -f
#
# Suderra OS — appliance firewall
#
# Runtime lockdown sonrası yüklenir. Inbound SSH kapalıdır.
#

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Established + related
        ct state established,related accept

        # ICMP — sınırlı
        ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded, parameter-problem } limit rate 10/second accept
        ip6 nexthdr icmpv6 icmpv6 type { destination-unreachable, packet-too-big, time-exceeded, parameter-problem, echo-request, nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } limit rate 10/second accept

        # Geri kalan reddedildi (policy drop). SSH sadece provisioning modunda açıktır.
        # log prefix "[nft-drop-in] " counter drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        # Hiçbir şey forward edilmez (cihaz router değil)
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # Loopback
        oif "lo" accept

        # Established + related
        ct state established,related accept

        # KABUL EDİLEN AÇIK (egress hedef kısıtı yok): port bazlı izinler
        # herhangi bir IP'ye açık — ele geçirilmiş agent bu portlardan veri
        # sızdırabilir. Hedef setleri (cloud API, broker, PLC subnet)
        # dağıtıma özgüdür; provisioning sırasında named set olarak
        # doldurulmalı ve ADR-0007 G4 saha doğrulamasıyla sıkılaştırılmalı.

        # DNS (yapılandırılmış resolver'lara kısıtlanacak)
        udp dport 53 accept
        tcp dport 53 accept

        # NTP (chrony)
        udp dport 123 accept

        # HTTPS (OTA + provisioning)
        tcp dport 443 accept

        # MQTT TLS (cloud broker)
        tcp dport 8883 accept

        # Modbus TCP (PLC'lere)
        tcp dport 502 accept

        # OPC UA (sahadaki HMI sunucularına)
        tcp dport 4840 accept

        # Geri kalan reddedildi
        # log prefix "[nft-drop-out] " counter drop
    }
}
