#!/usr/sbin/nft -f
#
# Suderra OS — appliance firewall (IEC 62443 least-privilege)
#
# Runtime lockdown sonrası yüklenir. Inbound SSH kapalıdır. EGRESS hedefe göre
# FAIL-CLOSED'dur: cihaz yalnız açıkça beyan edilmiş hedeflere çıkabilir. Ele
# geçmiş bir iş yükü (Modbus/OPC-UA/MQTT/HTTPS portlarından bile) keyfi bir host'a
# veri sızdıramaz. Hedef setleri imzalı, salt-okunur rootfs'teki
# /etc/suderra/egress.d/*.nft ile beyan edilir (verified-boot'un parçası; runtime'da
# kurcalanamaz). Set boşsa (deployment henüz commission etmediyse) ilgili portlara
# çıkış DÜŞER. Format: /etc/suderra/egress.d/00-example.nft.example.
#
# Not: /data (runtime-yazılabilir) üzerinden include EDİLMEZ — `nft -f` atomik
# olduğundan malformed bir runtime dosyası firewall'u komple fail-OPEN bırakırdı;
# egress politikası bilinçli olarak imzalı imajın parçasıdır.

flush ruleset

table inet filter {
    # --- Egress hedef allow-list'leri (fail-closed; imzalı config'ten doldurulur) ---
    # ipv4_addr + interval → CIDR aralıkları desteklenir. Boş set = o sınıfa çıkış yok.
    set egress_update { type ipv4_addr; flags interval; }   # OTA/update sunucuları (443)
    set egress_cloud  { type ipv4_addr; flags interval; }   # cloud API + MQTT broker (443/8883)
    set egress_field  { type ipv4_addr; flags interval; }   # PLC + HMI subnet'leri (502/4840)
    set egress_infra  { type ipv4_addr; flags interval; }   # DNS + NTP sunucuları (53/123)

    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Established + related
        ct state established,related accept

        # ICMP — sınırlı
        ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded, parameter-problem } limit rate 10/second accept
        ip6 nexthdr icmpv6 icmpv6 type { destination-unreachable, packet-too-big, time-exceeded, parameter-problem, echo-request, nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } limit rate 10/second accept

        # Geri kalan reddedildi (policy drop). SSH sadece provisioning modunda açıktır.
        # log prefix "[nft-drop-in] " counter drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        # Hiçbir şey forward edilmez (cihaz router değil)
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # Loopback
        oif "lo" accept

        # Established + related
        ct state established,related accept

        # Least-privilege egress: yalnız BEYAN EDİLMİŞ hedeflere, ilgili portlarda.
        # Setler boşken bu kuralların hiçbiri eşleşmez → policy drop (fail-closed).
        ip daddr @egress_infra  udp dport { 53, 123 } accept
        ip daddr @egress_infra  tcp dport 53 accept
        ip daddr @egress_update tcp dport 443 accept
        ip daddr @egress_cloud  tcp dport { 443, 8883 } accept
        ip daddr @egress_field  tcp dport { 502, 4840 } accept

        # IPv6 egress ve beyan edilmemiş her hedef → düşer. Rate-limited log
        # commissioning teşhisini kolaylaştırır ("hangi hedef bloklanıyor").
        limit rate 5/minute log prefix "[nft-egress-drop] " counter drop
    }
}

# Deployment-managed egress hedef beyanları (set element'leri), imzalı RO rootfs'te.
# Glob eşleşmezse (henüz commission edilmemiş) sessizce boş kalır → fail-closed.
include "/etc/suderra/egress.d/*.nft"
