# Suderra OS — GRUB2 bootloader config (Faz 1 placeholder)
#
# Faz 1'de doldurulacak. Faz 3'te signed (Secure Boot zinciri ile).

set default=0
set timeout=2

# Renkli boot menü (sadece DEV)
set color_normal=white/black
set color_highlight=green/black

menuentry "Suderra OS (slot A)" --class suderra --class linux {
    set root=(hd0,gpt2)
    linux /boot/bzImage console=ttyS0,115200n8 console=tty0 \
        root=/dev/disk/by-partlabel/rootfs-a ro \
        lockdown=confidentiality \
        slab_nomerge slub_debug=- \
        page_alloc.shuffle=1 \
        randomize_kstack_offset=on \
        init_on_alloc=1 init_on_free=1 \
        vsyscall=none debugfs=off \
        oops=panic panic=10 \
        module.sig_enforce=1 \
        quiet
    # Faz 3'te dm-verity için ek parametreler:
    # dm-verity.hash=<root-hash>
}

menuentry "Suderra OS (slot B)" --class suderra --class linux {
    set root=(hd0,gpt3)
    linux /boot/bzImage console=ttyS0,115200n8 console=tty0 \
        root=/dev/disk/by-partlabel/rootfs-b ro \
        lockdown=confidentiality \
        quiet
}

