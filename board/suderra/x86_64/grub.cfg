# Suderra OS x86_64 production GRUB bootchooser.
#
# RAUC's GRUB backend owns ORDER, A_OK, A_TRY, B_OK and B_TRY in the
# environment block below. GRUB consumes the same file and chainloads signed
# slot UKIs so kernel, initrd-less command line, and verity root hash remain
# bound to Secure Boot signatures.

set timeout=0
set default=0
set pager=1

search --no-floppy --file --set=esp /EFI/BOOT/grubenv
if [ -z "$esp" ]; then
    echo "Suderra boot failure: EFI grubenv not found"
    halt
fi

set suderra_grubenv="(${esp})/EFI/BOOT/grubenv"
load_env --file=${suderra_grubenv} ORDER A_OK A_TRY B_OK B_TRY

if [ -z "$ORDER" ]; then
    set ORDER="A B"
fi
if [ -z "$A_OK" ]; then
    set A_OK=1
fi
if [ -z "$A_TRY" ]; then
    set A_TRY=0
fi
if [ -z "$B_OK" ]; then
    set B_OK=0
fi
if [ -z "$B_TRY" ]; then
    set B_TRY=0
fi

function boot_suderra_slot {
    set selected_slot="$1"
    set selected_ok=0
    set selected_try=0
    set selected_loader=""

    if [ "$selected_slot" = "A" ]; then
        set selected_ok="$A_OK"
        set selected_try="$A_TRY"
        set selected_loader="/EFI/SUDERRA/suderra-A.efi"
    fi
    if [ "$selected_slot" = "B" ]; then
        set selected_ok="$B_OK"
        set selected_try="$B_TRY"
        set selected_loader="/EFI/SUDERRA/suderra-B.efi"
    fi

    if [ -n "$selected_loader" ]; then
        if [ "$selected_try" != "0" ]; then
            if [ "$selected_slot" = "A" ]; then
                set A_TRY=0
            fi
            if [ "$selected_slot" = "B" ]; then
                set B_TRY=0
            fi
            save_env --file=${suderra_grubenv} A_TRY A_OK B_TRY B_OK ORDER
            chainloader (${esp})${selected_loader}
            boot
        fi

        if [ "$selected_ok" = "1" ]; then
            chainloader (${esp})${selected_loader}
            boot
        fi
    fi
}

for slot in $ORDER; do
    boot_suderra_slot "$slot"
done

echo "Suderra boot failure: no RAUC bootable slot in ORDER=$ORDER"
halt
