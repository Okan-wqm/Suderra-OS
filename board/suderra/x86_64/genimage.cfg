# Suderra OS — x86_64 disk image layout (genimage)
#
# Faz 1'de detaylanır. A/B partition + /data layout.
#
# Çağrı: scripts/post-image.sh içinden

image disk.img {
    hdimage {
        partition-table-type = "gpt"
        gpt-location = 32K
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = "true"
        image = "efi-part.vfat"
        size = 64M
    }

    partition rootfs-a {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
        size = 512M
    }

    partition rootfs-a-verity {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.verity"
        size = 64M
    }

    partition rootfs-b {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        # İlk imajda B slot boş — RAUC ilk update'te doldurur
        size = 512M
    }

    partition rootfs-b-verity {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        # İlk imajda B verity slot boş — RAUC ilk update'te doldurur
        size = 64M
    }

    partition data {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        # Production runtime provisions this as LUKS2 and unlocks it through
        # TPM2/swtpm. It must not ship as a plain ext4 filesystem.
        size = 2G
    }
}

# EFI bölümünün içeriği
image efi-part.vfat {
    vfat {
        file EFI {
            image = "efi-part/EFI"
        }
    }
    size = 64M
}
