# Suderra OS — QEMU GRUB2 config (Katman 3)
#
# QEMU defconfig için basit single-rootfs config.
# Production (suderra_x86_64_defconfig) için A/B partition'lı grub.cfg ayrı.

set default=0
set timeout=2

set color_normal=white/black
set color_highlight=green/black

menuentry "Suderra OS — QEMU x86_64" --class suderra --class linux {
    linux /boot/bzImage console=ttyS0,115200n8 console=tty0 \
        root=/dev/vda1 ro \
        slab_nomerge slub_debug=- \
        page_alloc.shuffle=1 \
        randomize_kstack_offset=on \
        init_on_alloc=1 init_on_free=1 \
        vsyscall=none \
        oops=panic panic=10 \
        quiet
}
