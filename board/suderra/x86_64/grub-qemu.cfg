# Suderra OS — QEMU GRUB2 config (Katman 3)
#
# QEMU defconfig için basit single-rootfs config.
# Production (suderra_x86_64_defconfig) için A/B partition'lı grub.cfg ayrı.
#
# Bu dosya BR2_TARGET_GRUB2_BUILTIN_CONFIG_EFI ile bootx64.efi içine gömülür.
# Menü tanımlamadan doğrudan boot eder; Buildroot ayrıca varsayılan
# EFI/BOOT/grub.cfg üretebilir, ama QEMU boot yolu bu dosyayı kullanır.

set default=0
set timeout=0

set color_normal=white/black
set color_highlight=green/black

set root=(hd0,gpt1)

linux /bzImage console=ttyS0,115200n8 console=tty0 \
    root=PARTLABEL=rootfs rootwait ro \
    slab_nomerge slub_debug=- \
    page_alloc.shuffle=1 \
    randomize_kstack_offset=on \
    init_on_alloc=1 init_on_free=1 \
    vsyscall=none \
    oops=panic panic=10 \
    quiet

boot
