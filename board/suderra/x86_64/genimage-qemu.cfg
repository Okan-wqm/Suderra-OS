# Suderra OS — QEMU x86_64 disk image layout
#
# Production'dan (A/B + /data) farklı olarak QEMU için TEK rootfs.
# Faz 1 boot-test bu layout'u kullanır.
#
# Çağrı: post-image.sh içinden (BR2_ROOTFS_POST_SCRIPT_ARGS=suderra_qemu_x86_64)

# EFI partition içeriği — Buildroot GRUB2 EFI çıktısını doğrudan kullanır.
image efi-part.vfat {
    vfat {
        file EFI {
            image = "efi-part/EFI"
        }

        file bzImage {
            image = "bzImage"
        }
    }
    size = 32M
}

image disk.img {
    hdimage {
        partition-table-type = "gpt"
        gpt-location = 32K
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = "true"
        image = "efi-part.vfat"
        size = 32M
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
        size = 256M
    }
}
