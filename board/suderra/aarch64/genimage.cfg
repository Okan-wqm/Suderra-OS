# Suderra OS — aarch64 disk image layout (Faz 1 placeholder)
#
# A/B partition + /data, U-Boot bootloader.

image disk.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition u-boot {
        partition-type-uuid = "21686148-6449-6E6F-744E-656564454649"
        image = "u-boot.bin"
        size = 8M
    }

    partition boot {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        bootable = "true"
        image = "boot.vfat"
        size = 64M
    }

    partition rootfs-a {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
        size = 512M
    }

    partition rootfs-b {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
        size = 512M
    }

    partition data {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        size = 2G
    }
}

image boot.vfat {
    vfat {
        files = {
            "Image",
            "dtb",
            "extlinux/extlinux.conf",
        }
    }
    size = 64M
}
