# Suderra OS — U-Boot extlinux boot menu (Faz 1 placeholder)
#
# Faz 1'de aarch64 hedef cihazlar için doldurulur.

DEFAULT suderra-os-a

LABEL suderra-os-a
    MENU LABEL Suderra OS (slot A)
    LINUX /boot/Image
    FDT /boot/dtb
    APPEND console=ttyAMA0,115200 console=tty1 \
        root=/dev/disk/by-partlabel/rootfs-a ro \
        lockdown=confidentiality \
        init_on_alloc=1 init_on_free=1 \
        oops=panic panic=10

LABEL suderra-os-b
    MENU LABEL Suderra OS (slot B)
    LINUX /boot/Image
    FDT /boot/dtb
    APPEND console=ttyAMA0,115200 console=tty1 \
        root=/dev/disk/by-partlabel/rootfs-b ro \
        lockdown=confidentiality
