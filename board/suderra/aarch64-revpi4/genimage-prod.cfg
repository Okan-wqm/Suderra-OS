# Suderra OS — Revolution Pi Connect 4 PRODUCTION disk layout (ADR-0007)
#
# GPT A/B + dm-verity + LUKS2 /data. Yalnız PROD variant post-image tarafından
# seçilir (dev build MBR aarch64-revpi4/genimage.cfg kullanmaya devam eder).
# RevPi Connect 4 BCM2711/CM4 tabanlı; boot zinciri rpi4 ile aynı (U-Boot +
# imzalı FIT), yalnız CM4 DTB'leri ve imaj adı farklı. /data LUKS2 RevPi'de
# SPI TPM2 (SLB9670) ile seal edilir.

image boot.vfat {
  vfat {
    label = "SUDRBOOT"
    files = {
      "u-boot.bin",
      "u-boot.dtb",
      "boot.scr",
      "suderra-A.fit",
      "suderra-B.fit",
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}

image suderra-revpi4-target.img {
  hdimage {
    partition-table-type = "gpt"
    gpt-location = 32K
  }

  partition boot {
    partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs-a {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    image = "rootfs.ext4"
    size = 512M
  }

  partition rootfs-a-verity {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    image = "rootfs.verity"
    size = 64M
  }

  partition rootfs-b {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    size = 512M
  }

  partition rootfs-b-verity {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    size = 64M
  }

  partition data {
    partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    # LUKS2, RevPi Connect 4 SPI TPM2 (SLB9670) ile seal. Düz ext4 SEVK EDİLMEZ.
    size = 2G
  }
}
