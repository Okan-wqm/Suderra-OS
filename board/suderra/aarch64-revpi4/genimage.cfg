# Suderra OS — Revolution Pi Connect 4 target image layout
#
# RevPi Connect 4 is treated as a separate target. USB-A self-install is
# supported where firmware boot order allows it; micro-USB/rpiboot remains the
# official fallback for eMMC flashing.

image boot.vfat {
  vfat {
    label = "SUDRBOOT"
    files = {
      "bcm2711-rpi-cm4.dtb",
      "bcm2711-rpi-cm4-io.dtb",
      "rpi-firmware/cmdline.txt",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup4.dat",
      "rpi-firmware/start4.elf",
      "Image"
    }
    file overlays {
      image = "rpi-firmware/overlays"
    }
  }
  size = 256M
}

image data.ext4 {
  ext4 {
    label = "SUDERRA-DATA"
  }
  size = 512M
}

image suderra-revpi4-target.img {
  hdimage {
    partition-table-type = "mbr"
  }

  partition boot {
    partition-type = 0xC
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.ext4"
  }

  partition data {
    partition-type = 0x83
    image = "data.ext4"
  }
}
