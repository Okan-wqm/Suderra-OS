  "runtime": {
    "observation_authority": {
      "schema_version": "suderra.runtime-observation.v1",
      "observed_outcome_sources": [
        "serial-marker",
        "guest-semantic",
        "secure-boot-event",
        "kernel-verity-event",
        "suderra-ota-event",
        "qmp-events"
      ],
      "forbidden_sources": [
        "expected-outcome",
        "scenario-contract",
        "manual-copy"
      ],
      "raw_replay_required": true
    },
    "required_checks": [
      "secure_boot",
      "dm_verity",
      "dm_verity_tamper",
      "rauc_good_update",
      "rauc_bad_signature",
      "rauc_health_rollback",
      "anti_rollback",
      "data_luks",
      "lockdown",
      "nmap",
      "systemd_security"
    ],
    "required_scenarios": [
      "signed-boot",
      "unsigned-boot-rejection",
      "cmdline-tamper-rejection",
      "dm-verity-rootfs-tamper-rejection",
      "rauc-good-update",
      "rauc-bad-signature-rejection",
      "rauc-health-rollback",
      "anti-rollback-downgrade-rejection",
      "data-luks-swtpm"
    ],
    "scenario_to_checks": {
      "anti-rollback-downgrade-rejection": ["anti_rollback"],
      "data-luks-swtpm": ["data_luks"],
      "dm-verity-rootfs-tamper-rejection": ["dm_verity_tamper"],
      "rauc-bad-signature-rejection": ["rauc_bad_signature"],
      "rauc-good-update": ["rauc_good_update"],
      "rauc-health-rollback": ["rauc_health_rollback"],
      "signed-boot": ["secure_boot", "dm_verity", "lockdown", "nmap", "systemd_security"]
    },
    "scenario_contracts": {
      "anti-rollback-downgrade-rejection": {
        "expected_outcome": "userspace-rejected",
        "guest_facts_required": false,
        "mutation_target": "manifest",
        "mutation_type": "rollback-floor",
        "observation_source": ["serial", "qmp-events"],
        "observed_layer": "userspace",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "cmdline-tamper-rejection": {
        "expected_outcome": "kernel-rejected",
        "guest_facts_required": false,
        "mutation_target": "uki-cmdline",
        "mutation_type": "signed-cmdline",
        "observation_source": ["serial", "qmp-events"],
        "observed_layer": "kernel",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "data-luks-swtpm": {
        "expected_outcome": "booted",
        "guest_facts_required": true,
        "mutation_target": "data",
        "mutation_type": "swtpm-state",
        "observation_source": ["serial", "qmp-events", "guest-semantic"],
        "observed_layer": "storage",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "dm-verity-rootfs-tamper-rejection": {
        "expected_outcome": "kernel-rejected",
        "guest_facts_required": false,
        "mutation_target": "rootfs",
        "mutation_type": "rootfs-tamper",
        "observation_source": ["serial", "qmp-events"],
        "observed_layer": "kernel",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "rauc-bad-signature-rejection": {
        "expected_outcome": "userspace-rejected",
        "guest_facts_required": false,
        "mutation_target": "bundle",
        "mutation_type": "rauc-signature",
        "observation_source": ["serial", "qmp-events"],
        "observed_layer": "userspace",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "rauc-good-update": {
        "expected_outcome": "booted",
        "guest_facts_required": true,
        "mutation_target": "inactive-slot",
        "mutation_type": "rauc-install",
        "observation_source": ["serial", "qmp-events", "guest-semantic"],
        "observed_layer": "userspace",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "rauc-health-rollback": {
        "expected_outcome": "rollback-completed",
        "guest_facts_required": true,
        "mutation_target": "health-gate",
        "mutation_type": "rauc-health",
        "observation_source": ["serial", "qmp-events", "guest-semantic"],
        "observed_layer": "userspace",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "signed-boot": {
        "expected_outcome": "booted",
        "guest_facts_required": true,
        "mutation_target": "none",
        "mutation_type": "none",
        "observation_source": ["serial", "qmp-events", "guest-semantic"],
        "observed_layer": "runtime",
        "required_log_roles": ["serial", "qmp-events"]
      },
      "unsigned-boot-rejection": {
        "expected_outcome": "firmware-rejected",
        "guest_facts_required": false,
        "mutation_target": "uki",
        "mutation_type": "secureboot-signature",
        "observation_source": ["serial", "qmp-events"],
        "observed_layer": "firmware",
        "required_log_roles": ["serial", "qmp-events"]
      }
    },
    "suite_targets": {
      "pi-cm4-revpi-usb-installer": [],
      "qemu-x86_64": [],
      "qemu-x86_64-prod-ab": ["qemu-x86_64-prod-ab"],
      "revpi4": [],
      "rpi4": [],
      "x86_64": ["qemu-x86_64-prod-ab"]
    }
