    ],
    "x86_required_negative_tests": [
      "dm-verity-rootfs-tamper",
      "secure-boot-unsigned-uki",
      "rauc-health-rollback"
    ]
  },
  "signing": {
    "manifest_schema_version": "suderra.signing-manifest.v2",
    "request_schema_version": "suderra.signing-request.v1",
    "manifest_required_fields": [
      "schema_version",
      "subject_id",
      "version",
      "target",
      "source_sha",
      "source_run_id",
      "roles"
    ],
    "role_required_fields": [
      "role",
      "input_sha256",
      "output_sha256",
      "certificate_sha256",
      "pkcs11_uri",
      "hsm_serial",
      "key_id",
      "challenge_transcript_sha256",
      "challenge_signature_sha256",
      "artifact_signature_sha256",
      "artifact_path",
      "artifact_bytes",
      "verifier",
      "replay_status"
    ],
    "digest_semantics": {
      "input_sha256": "bytes-before-role-signature",
      "output_sha256": "final-signed-artifact-bytes",
      "certificate_sha256": "signing-certificate-bytes",
      "challenge_transcript_sha256": "canonical challenge transcript replay bytes",
      "artifact_signature_sha256": "detached or embedded signature bytes",
      "artifact_path": "relative final artifact path inside the governed signing output set",
      "artifact_bytes": "final signed artifact byte length"
    },
    "replay_requirements": {
      "certificate_key_match_required": true,
      "challenge_signature_replay_required": true,
      "artifact_signature_replay_required": true,
      "transcript_digest_replay_required": true,
      "software_hsm_rejected_for_production": true,
      "approved_provider_allowlist_enforced": true,
      "approved_provider_allowlist": [
        "yubihsm",
        "thales luna",
        "entrust nshield",
        "utimaco",
        "aws cloudhsm",
        "nitrokey hsm",
        "marvell liquidsecurity"
      ]
    },
    "role_bindings": {
      "os-update-manifest": {
        "digest_source": "manifest-json",
        "required_for_ota_capable": true,
        "final_digest_field": "output_sha256",
        "input_digest_field": "input_sha256"
      },
      "rauc-bundle": {
        "digest_source": "final-raucb",
        "required_for_ota_capable": true,
        "final_digest_field": "output_sha256",
        "input_digest_field": "input_sha256"
      },
      "release-artifact": {
        "digest_source": "release-input-binding",
        "required_for_release_public": true,
        "final_digest_field": "output_sha256",
        "input_digest_field": "input_sha256"
      },
      "release-image": {
        "digest_source": "release-input-binding",
        "required_for_release_public": true,
        "final_digest_field": "output_sha256",
        "input_digest_field": "input_sha256"
      }
    },
    "signed_artifact_roles": [
      "rauc-bundle",
      "release-artifact",
      "release-image",
      "os-update-manifest"
    ]
  },
