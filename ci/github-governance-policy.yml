{
  "schema_version": "suderra.github-governance-policy.v2",
  "repository": "Okan-wqm/Suderra-OS",
  "protected_branch": "main",
  "branch_protection": {
    "minimum_approving_reviews": 2
  },
  "required_checks": [
    "Lint / Build Matrix Contract",
    "Lint / GitHub Actions Lint",
    "Lint / Image Contract + Installer Tests",
    "Lint / ShellCheck",
    "Lint / Markdown Lint",
    "Lint / Secret Scan (gitleaks)",
    "Lint / YAML Lint",
    "Lint / DCO (Signed-off-by) Check",
    "Build / Build matrix contract",
    "Build / Syntax and workflow contracts",
    "Build / Buildroot defconfig parse smoke (qemu-x86_64)",
    "Build / Buildroot defconfig parse smoke (rpi4)",
    "Build / Buildroot defconfig parse smoke (pi-cm4-revpi-usb-installer)",
    "Build / Buildroot defconfig parse smoke (revpi4)",
    "Security Scan / Trivy (filesystem)",
    "Security Scan / Trivy (config / Dockerfile)",
    "Security Scan / Gitleaks (secret scan)",
    "Security Scan / Grype (filesystem)",
    "Security Scan / VEX JSON syntax",
    "Hadolint (Dockerfile lint) / Hadolint",
    "Rust Userspace / Format + Clippy + Test",
    "Rust Userspace / Build (x86_64-unknown-linux-musl)",
    "Rust Userspace / Build (aarch64-unknown-linux-musl)",
    "Rust Userspace / Security (audit + deny)",
    "Rust Userspace / MSRV check (Rust 1.86)"
  ],
  "release_environment": {
    "name": "release-publish",
    "allowed_ref": "refs/tags/v*",
    "minimum_reviewers": 2,
    "prevent_self_review": true,
    "required_reviewers": [
      "release-owner",
      "security-owner"
    ]
  },
  "signing_environment": {
    "name": "release-sign",
    "allowed_ref": "refs/tags/v*",
    "minimum_reviewers": 2,
    "prevent_self_review": true,
    "required_reviewers": [
      "release-owner",
      "security-owner"
    ]
  },
  "role_binding_manifest": {
    "schema_version": "suderra.governance-role-bindings.v1",
    "path_template": "release-governance/{version}/role-bindings.json",
    "required_roles": [
      "release-owner",
      "security-owner"
    ],
    "identity_source": "github-user-or-team",
    "role_names_are_not_identities": true,
    "required_identity_fields": [
      "github_subject",
      "subject_type",
      "github_node_id",
      "source_snapshot_sha256",
      "permission_snapshot_sha256",
      "environment_reviewer_binding_sha256",
      "effective_permission"
    ]
  },
  "drift_monitoring": {
    "scheduled_check_required": true,
    "signed_evidence_path": "release-governance/{version}/governance-policy-validation.json",
    "release_independent": true
  },
  "release_freeze": {
    "protected_ref": "refs/heads/main",
    "ingress_requires_head_sha": true,
    "preflight_requires_head_sha": true,
    "supersede_on_main_advance": true
  },
  "required_codeowners_patterns": [
    ".github/workflows/*.yml",
    ".github/CODEOWNERS",
    "ci/build-matrix.yml",
    "ci/github-governance-policy.yml",
    "docs/dev/branch-protection.md",
    "docs/operations/**",
    "docs/security/**",
    "scripts/evidence/**",
    "scripts/ci/validate-build-matrix.py",
    "tests/qemu/**",
    "board/keys/**",
    "board/suderra/common/post-image.sh",
    "tests/image-contracts/**"
  ],
  "ruleset": {
    "branch_name": "main-protection",
    "tag_name": "release-tag-protection",
    "allow_bypass_actors": false
  },
  "audit_log_lookback_days": 30
}
