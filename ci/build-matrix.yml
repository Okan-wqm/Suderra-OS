#
# Suderra OS CI build matrix and image contracts.
#
# This file is the single source of truth for Buildroot targets consumed by
# GitHub Actions and local validation. Do not duplicate target lists in
# workflows; generate matrices with scripts/ci/validate-build-matrix.py.
#

defconfigs:
  - name: suderra_qemu_x86_64_defconfig
    target: qemu-x86_64
    arch: x86_64
    artifact: disk.img
    release_artifact: suderra-qemu-x86_64.img.xz
    expected_artifacts:
      - disk.img
      - disk.img.xz
      - MANIFEST.txt
    qemu_test: true
    ci_build: true
    fast_required: true
    image_build: true
    release_source: true
    payload_base_required: false
    release: true
    timeout_minutes: 300
    build_step_timeout_minutes: 285
    min_disk_gib: 30
    min_mem_gib: 6
    min_vcpu: 4
    build_jlevel: 4
    prebuild_defconfigs:
    payload_image_exports:
    production_required: false
    production_ready: false
    profile: provisioning
    boot_mode: uefi-grub
    partition_table: gpt
    root_partition: rootfs
    root_identity: gpt-label-rootfs
    genimage: board/suderra/x86_64/genimage-qemu.cfg
    post_image_arg: suderra_qemu_x86_64
    signing: unsigned-lab
    acceptance: qemu-system-x86_64-ovmf
    blocker: secure-boot-dm-verity-rauc-not-enabled
    description: QEMU smoke/acceptance image for development and CI.

  - name: suderra_x86_64_defconfig
    target: x86_64
    arch: x86_64
    artifact: disk.img
    release_artifact: suderra-x86_64-target.img.xz
    expected_artifacts:
      - disk.img
      - disk.img.xz
      - MANIFEST.txt
    qemu_test: false
    ci_build: false
    fast_required: false
    image_build: false
    release_source: false
    payload_base_required: false
    release: false
    timeout_minutes: 300
    build_step_timeout_minutes: 285
    min_disk_gib: 30
    min_mem_gib: 6
    min_vcpu: 4
    build_jlevel: 4
    prebuild_defconfigs:
    payload_image_exports:
    production_required: true
    production_ready: false
    profile: locked-appliance
    boot_mode: uefi-secureboot-uki
    partition_table: gpt
    root_partition: rootfs-a
    root_identity: verity-signed-cmdline
    genimage: board/suderra/x86_64/genimage.cfg
    post_image_arg: suderra_x86_64
    signing: production-required
    acceptance: hardware-lab
    blocker: x86-production-secureboot-verity-rauc-hsm-runtime-v2-and-hardware-evidence-missing
    description: Industrial x86_64 production target; production_ready stays false until HSM, runtime-v2, and x86 hardware lab evidence are preserved.

  - name: suderra_qemu_x86_64_prod_ab_defconfig
    target: qemu-x86_64-prod-ab
    arch: x86_64
    artifact: disk.img
    release_artifact: suderra-qemu-x86_64-prod-ab.img.xz
