    genimage: board/suderra/aarch64-rpi4/genimage.cfg
    post_image_arg: suderra_aarch64_rpi4
    signing: production-required
    acceptance: pi4-cm4-hardware-lab
    blocker: signed-fit-dm-verity-rauc-and-hardware-evidence-missing
    description: Raspberry Pi 4 / Compute Module 4 target image.

  - name: suderra_aarch64_rpi4_usb_installer_defconfig
    target: pi-cm4-revpi-usb-installer
    arch: aarch64
    artifact: suderra-pi-cm4-revpi-usb-installer.img
    release_artifact: suderra-pi-cm4-revpi-usb-installer.img.xz
    expected_artifacts:
      - suderra-pi-cm4-revpi-usb-installer.img
      - suderra-pi-cm4-revpi-usb-installer.img.xz
      - MANIFEST.txt
      - manifest.json
      - manifest.sig
    qemu_test: false
    ci_build: true
    fast_required: true
    image_build: true
    release_source: true
    payload_base_required: true
    release: true
    timeout_minutes: 360
    build_step_timeout_minutes: 340
    min_disk_gib: 35
    min_mem_gib: 6
    min_vcpu: 4
    build_jlevel: 4
    prebuild_defconfigs:
      - suderra_aarch64_rpi4_defconfig
      - suderra_aarch64_revpi4_defconfig
    payload_image_exports:
      - SUDERRA_RPI4_TARGET_IMAGE_XZ=suderra_aarch64_rpi4_defconfig:suderra-rpi4-target.img.xz
      - SUDERRA_REVPI4_TARGET_IMAGE_XZ=suderra_aarch64_revpi4_defconfig:suderra-revpi4-target.img.xz
    production_required: true
    production_ready: false
    profile: provisioning-installer
    boot_mode: rpi-firmware-installer
    partition_table: mbr
    root_partition: rootfs
    root_identity: installer-rootfs
    genimage: board/suderra/aarch64-rpi4-usb-installer/genimage.cfg
    post_image_arg: suderra_aarch64_rpi4_usb_installer
    signing: payload-ed25519-required
    acceptance: pi4-cm4-revpi-hardware-lab
    blocker: production-payload-key-policy-and-hardware-flash-evidence-missing
    description: USB self-installer for Pi 4, CM4, and RevPi payloads.

