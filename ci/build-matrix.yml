variants:
  - name: dev
    description: Development and lab images may keep provisioning/debug affordances.
  - name: prod
    description: Production images require signed boot artifacts, dm-verity, RAUC A/B, encrypted data, and release evidence.

security_scans:
  - actionlint
  - shellcheck
  - yamllint
  - markdownlint
  - hadolint
  - gitleaks
  - rust-fmt
  - rust-clippy
  - rust-test
  - cargo-deny
  - trivy
  - grype
