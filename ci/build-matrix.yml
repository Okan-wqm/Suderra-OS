      - disk.img
      - disk.img.xz
      - MANIFEST.txt
    qemu_test: false
    ci_build: false
    fast_required: false
    image_build: false
    release_source: false
    payload_base_required: false
    release: false
    timeout_minutes: 300
    build_step_timeout_minutes: 285
    min_disk_gib: 30
    min_mem_gib: 6
    min_vcpu: 4
    build_jlevel: 4
    prebuild_defconfigs:
    payload_image_exports:
    production_required: true
    production_ready: false
    profile: production-runtime
    boot_mode: uefi-secureboot-uki-qemu
    partition_table: gpt
    root_partition: rootfs-a
    root_identity: verity-signed-cmdline
    genimage: board/suderra/x86_64/genimage.cfg
    post_image_arg: suderra_qemu_x86_64_prod_ab
    signing: production-required
    acceptance: qemu-system-x86_64-production-runtime-blocked
    blocker: production-runtime-qemu-v2-secureboot-verity-rauc-hsm-evidence-missing
    description: Non-public QEMU production-runtime A/B evidence lane; emits runtime suite v2 after real measurements pass.

