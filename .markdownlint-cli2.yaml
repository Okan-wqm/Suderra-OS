config:
  default: true
  MD013: false  # line-length — uzun cümlelere izin
  MD024:
    siblings_only: true
  MD033: false  # inline HTML
  MD041: false  # first line H1
  MD046:
    style: fenced
  MD007:
    indent: 2

globs:
  - "**/*.md"

ignores:
  - "buildroot/**"
  - "output/**"
  - "dl/**"
  - "node_modules/**"
  - "CHANGELOG.md"
