config:
  default: true
  MD013: false  # line-length — uzun cümlelere izin
  MD024:
    siblings_only: true
  MD033: false  # inline HTML
  MD041: false  # first line H1
  MD046:
    style: fenced
  MD007:
    indent: 2
  # Pragmatik gevşetmeler (Faz 5+'da geri sertleştirilebilir):
  MD040: false  # fenced-code-language — bazı bloklar dil-agnostik tree/log
  MD060: false  # table-column-style — kompakt table'lara izin
  MD031: false  # blanks-around-fences — yoğun yerleştirilmiş kod blokları
  MD032: false  # blanks-around-lists — yoğun listeler
  MD022: false  # blanks-around-headings — bazı README'ler kompakt
  MD026: false  # trailing-punctuation in headings (Türkçe "?", ":")
  MD036: false  # emphasis-as-heading (kullanmıyoruz ama bazı yerlerde **bold** başlık)
  MD012: false  # multiple-blanks — esnek olsun
  MD034: false  # bare-URL — README'lerde URL'ler raw yazılabilir
  MD025: false  # multiple-h1 (bazı dosyalarda ROADMAP gibi)
  MD028: false  # blank-line-inside-blockquote
  MD029: false  # ol-prefix
  MD009: false  # trailing spaces (Markdown line-break için 2 boşluk yaygın)
  MD056: false  # table-column-count (mevcut compliance dosyalarında yaygın, Faz 5+'da temizlenir)
  MD058: false  # blanks-around-tables
  MD038: false  # no-space-in-code
  MD051: false  # link-fragments (TOC linklerinde özel karakter)
  MD052: false  # reference-links

globs:
  - "**/*.md"

ignores:
  - "buildroot/**"
  - "output/**"
  - "dl/**"
  - "node_modules/**"
  - "CHANGELOG.md"
