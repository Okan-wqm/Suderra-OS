# cargo-deny konfigürasyonu — Suderra OS userspace
#
# Çalıştırma: cargo deny check
# CI'da rust.yml workflow'unda her PR'da koşar.
#
# Amaç:
# 1. Lisans uyumluluğu (GPL bulaşması ENGELLE)
# 2. CVE'li paket ENGELLE
# 3. Banned crate'leri ENGELLE (örn. openssl-sys — biz rustls kullanıyoruz)
# 4. Multiple version uyarı (dependency tree temizliği)

[graph]
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ----------------------------------------------------------------------------
# Advisories (CVE database)
# ----------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
version = 2
ignore = []   # CVE ignore listesi BOŞ olmalı — istisna varsa burada justify et

# ----------------------------------------------------------------------------
# Licenses — sadece OSI-onaylı + GPL-compatible olmayan permissive
# ----------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",     # weak copyleft, dosya-bazlı, bizi yutmaz
]
confidence-threshold = 0.93
exceptions = []

# GPL kontaminasyonunu açıkça yasakla
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ----------------------------------------------------------------------------
# Bans — yasak crate'ler
# ----------------------------------------------------------------------------
[bans]
multiple-versions = "warn"   # aynı crate iki versiyonda → uyarı (deduplicate et)
wildcards = "deny"           # version = "*" yasak (reproducibility için)
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Yasak crate'ler — neden yasak olduklarının açıklamasıyla
deny = [
    # OpenSSL bindings yasak — rustls kullanıyoruz (musl uyumlu, audit-friendly)
    { name = "openssl", reason = "Suderra OS rustls kullanır (musl uyumlu, OpenSSL yok)" },
    { name = "openssl-sys", reason = "Aynı — rustls feature'ı seç" },
    { name = "native-tls", reason = "Aynı — rustls feature'ı seç" },

    # Eski/güvensiz async runtime'lar
    { name = "tokio", version = "<1.0", reason = "Sadece tokio 1.x destekleniyor" },

    # Bilinen sorunlu crate'ler
    { name = "time", version = "<0.2.23", reason = "RUSTSEC-2020-0071" },
]

# Skip duplicate version uyarıları için (justified)
skip = []
skip-tree = []

# ----------------------------------------------------------------------------
# Sources — sadece crates.io + bizim github
# ----------------------------------------------------------------------------
[sources]
unknown-registry = "deny"   # bilinmeyen registry yasak (supply chain)
unknown-git = "deny"        # rastgele git URL yasak
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = [
    "https://github.com/Okan-wqm/aquaculture_platform",   # Edge Agent fetch için
]
